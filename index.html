.topbar{position:sticky;top:0;z-index:50;background:rgba(3,7,17,.82);border-bottom:1px solid var(--line);backdrop-filter:blur(16px)}header{max-width:1260px;margin:0 auto;padding:14px 18px 12px}.brandrow{display:flex;align-items:center;justify-content:space-between;gap:14px}.brandmark{display:flex;align-items:center;gap:12px}.logo{width:52px;height:52px;border-radius:18px;display:grid;place-items:center;font-weight:1000;color:#06101f;background:radial-gradient(circle at 32% 28%,#fff 0 10%,transparent 11%),conic-gradient(from 220deg,var(--green),var(--cyan),var(--gold),var(--red),var(--green));box-shadow:0 0 28px rgba(101,242,255,.32),inset 0 0 0 2px rgba(255,255,255,.3);transform:skew(-7deg)}h1{font-size:34px;line-height:1;margin:0;letter-spacing:-.045em}.tagline{font-size:13px;color:var(--muted);margin-top:5px}.right-tools{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.pillbtn,.navbtn,.cta{appearance:none;border:1px solid rgba(255,255,255,.18);background:linear-gradient(180deg,rgba(255,255,255,.12),rgba(255,255,255,.06));color:var(--text);border-radius:999px;padding:10px 14px;font-weight:900;cursor:pointer;box-shadow:inset 0 0 0 1px rgba(255,255,255,.05)}.pillbtn:hover,.navbtn:hover,.cta:hover{transform:translateY(-1px);border-color:rgba(101,242,255,.45)}.api-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--red);margin-right:7px;box-shadow:0 0 12px currentColor}.api-dot.on{background:var(--green)}nav{display:flex;gap:8px;margin-top:14px;overflow:auto;padding-bottom:2px}.navbtn{white-space:nowrap}.navbtn.active{background:linear-gradient(135deg,#ffe28a,#ffc857);color:#071326;border-color:rgba(255,255,255,.45)}main{max-width:1260px;margin:0 auto;padding:18px}.page{display:none}.page.active{display:block}.hero{position:relative;overflow:hidden;border:1px solid rgba(255,255,255,.16);border-radius:28px;background:linear-gradient(135deg,rgba(255,209,102,.15),rgba(101,242,255,.10) 45%,rgba(169,108,255,.13)),rgba(13,31,58,.76);box-shadow:var(--shadow);padding:26px}.hero:after{content:"LIVE MARKET";position:absolute;right:-28px;top:10px;font-size:70px;font-weight:1000;letter-spacing:.06em;color:rgba(255,255,255,.045);transform:rotate(7deg)}.kicker{text-transform:uppercase;font-size:11px;letter-spacing:.18em;color:var(--cyan);font-weight:1000}.hero h2,.section-title{margin:.25rem 0;font-size:30px;letter-spacing:-.04em}.hero p{max-width:760px;color:#d8e8fb;line-height:1.5}.grid{display:grid;gap:14px}.grid.two{grid-template-columns:1.15fr .85fr}.grid.three{grid-template-columns:repeat(3,1fr)}.grid.four{grid-template-columns:repeat(4,1fr)}.card{border:1px solid rgba(255,255,255,.15);border-radius:var(--radius);background:linear-gradient(180deg,rgba(18,45,82,.92),rgba(9,22,43,.92));box-shadow:var(--shadow);padding:16px;overflow:hidden}.card-header{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px}.mini-card{border:1px solid rgba(255,255,255,.13);border-radius:20px;padding:14px;background:rgba(0,0,0,.18)}.metric{font-size:32px;font-weight:1000;letter-spacing:-.04em}.small{font-size:12px;color:var(--muted)}.muted{color:var(--muted)}.team-logo{width:38px;height:38px;border-radius:10px;object-fit:cover;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12)}.team-cell{display:flex;align-items:center;gap:10px;min-width:0}.team-name-stack{min-width:0}.team-name-stack b{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.team-name-stack span{display:block}.badge{display:inline-flex;align-items:center;gap:6px;border:1px solid rgba(255,255,255,.18);border-radius:999px;padding:5px 9px;font-size:11px;font-weight:1000;background:rgba(255,255,255,.08)}.badge.green{color:#caffdf;border-color:rgba(34,226,139,.35);background:rgba(34,226,139,.12)}.badge.red{color:#ffd0d8;border-color:rgba(255,77,109,.4);background:rgba(255,77,109,.14)}.badge.blue{color:#d4f7ff;border-color:rgba(101,242,255,.36);background:rgba(101,242,255,.12)}.badge.gold{color:#fff2bd;border-color:rgba(255,209,102,.42);background:rgba(255,209,102,.14)}.badge.purple{color:#eadcff;border-color:rgba(169,108,255,.38);background:rgba(169,108,255,.13)}.match-centre{margin-top:14px}.match-card{position:relative;border:1px solid rgba(255,255,255,.14);border-radius:24px;background:linear-gradient(135deg,rgba(11,27,52,.96),rgba(19,45,82,.92));padding:16px;overflow:hidden}.match-card.live{border-color:rgba(255,77,109,.55);box-shadow:0 0 0 1px rgba(255,77,109,.22),0 14px 36px rgba(255,77,109,.12)}.match-card.live:before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 10% 0%,rgba(255,77,109,.18),transparent 42%);pointer-events:none}.match-top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:10px}.fixture-row{display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:center}.side{text-align:left;min-width:0}.side.away{text-align:right}.nation{font-size:20px;font-weight:1000;letter-spacing:-.03em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.score{font-size:34px;font-weight:1000;color:#fff;min-width:92px;text-align:center;border-radius:18px;padding:8px 10px;background:rgba(0,0,0,.28);border:1px solid rgba(255,255,255,.12)}.owners{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}.side.away .owners{justify-content:flex-end}.owner-chip{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:5px 8px;background:rgba(101,242,255,.10);border:1px solid rgba(101,242,255,.24);font-size:11px;color:#dffcff}.owner-chip img{width:18px;height:18px;border-radius:5px;object-fit:cover}.pulse{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--red);box-shadow:0 0 0 0 rgba(255,77,109,.75);animation:pulse 1.4s infinite}@keyframes pulse{70%{box-shadow:0 0 0 10px rgba(255,77,109,0)}}table{width:100%;border-collapse:separate;border-spacing:0 8px}th{font-size:11px;text-align:left;color:#bed2e9;text-transform:uppercase;letter-spacing:.08em;padding:0 10px}td{background:rgba(255,255,255,.055);border-top:1px solid rgba(255,255,255,.09);border-bottom:1px solid rgba(255,255,255,.09);padding:10px}td:first-child{border-left:1px solid rgba(255,255,255,.09);border-radius:14px 0 0 14px}td:last-child{border-right:1px solid rgba(255,255,255,.09);border-radius:0 14px 14px 0}.pos{display:grid;place-items:center;width:28px;height:28px;border-radius:9px;background:#e8f1ff;color:#071326;font-weight:1000}.pos.top{background:linear-gradient(135deg,#ffe28a,#ffc857)}.points{font-size:22px;color:var(--gold);font-weight:1000;text-align:right}.result-list,.fixture-list{display:grid;gap:10px}.compact-fixture{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center;border:1px solid rgba(255,255,255,.11);background:rgba(0,0,0,.18);border-radius:18px;padding:12px}.compact-fixture .name{font-weight:950;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.compact-fixture .away{text-align:right}.vs{background:rgba(0,0,0,.26);border:1px solid rgba(255,255,255,.10);border-radius:999px;padding:6px 10px;font-weight:1000}.modal{position:fixed;inset:0;display:none;place-items:center;background:rgba(0,0,0,.6);z-index:100;padding:18px}.modal.open{display:grid}.modal-box{width:min(620px,100%);border-radius:24px;padding:20px;background:#081426;border:1px solid rgba(255,255,255,.16);box-shadow:var(--shadow)}label{display:block;font-weight:950;margin:14px 0 6px}input{width:100%;border:1px solid rgba(255,255,255,.18);border-radius:14px;background:rgba(255,255,255,.08);color:var(--text);padding:12px}.actions{display:flex;gap:10px;justify-content:flex-end;margin-top:16px;flex-wrap:wrap}.error{border:1px solid rgba(255,77,109,.35);background:rgba(255,77,109,.12);border-radius:16px;padding:12px;color:#ffdbe2;margin:12px 0}.hide-mobile{display:table-cell}.spark{font-weight:1000;color:var(--gold)}

.day-nav{display:flex;align-items:center;gap:10px;flex-wrap:wrap}.day-title{font-weight:1000;color:#fff}.capture-target{background:linear-gradient(180deg,rgba(18,45,82,.96),rgba(9,22,43,.96));border-radius:22px;padding:4px}.trend{display:inline-grid;place-items:center;width:24px;height:24px;border-radius:8px;margin-left:6px;font-size:14px;font-weight:1000;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.07)}.trend.up{color:#baffd7;background:rgba(34,226,139,.13);border-color:rgba(34,226,139,.35)}.trend.down{color:#ffd1d9;background:rgba(255,77,109,.13);border-color:rgba(255,77,109,.35)}.trend.same{color:#c8d7e8}.table-stat{font-size:14px;font-weight:1000}.table-stat.good{color:var(--green)}.table-stat.bad{color:var(--red)}.table-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.window-note{color:var(--muted);font-size:12px;margin-top:4px}.empty-row{border:1px dashed rgba(255,255,255,.18);border-radius:18px;padding:18px;text-align:center;color:var(--muted);background:rgba(0,0,0,.18)}.screenshot-toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:#081426;border:1px solid rgba(101,242,255,.35);box-shadow:var(--shadow);border-radius:999px;padding:10px 14px;color:#e8fbff;font-weight:900;z-index:200;display:none}.screenshot-toast.show{display:block}.clean-card{margin-top:0}.home-spacer{height:4px}.share-note{font-size:11px;color:var(--muted)}

@media(max-width:900px){h1{font-size:23px}.logo{width:42px;height:42px;border-radius:14px}.grid.two,.grid.three,.grid.four{grid-template-columns:1fr}.hero{padding:18px}.hero:after{font-size:38px}.fixture-row{grid-template-columns:1fr;gap:6px}.side,.side.away{text-align:left}.side.away .owners{justify-content:flex-start}.score{width:100%;font-size:28px}.match-top{align-items:flex-start;flex-direction:column}.hide-mobile{display:none}.compact-fixture{grid-template-columns:1fr;gap:6px}.compact-fixture .away{text-align:left}.vs{width:max-content}.brandrow{align-items:flex-start}.right-tools{justify-content:flex-end}.topbar{position:relative}main{padding:12px}}

<body>
<div class="topbar"><header><div class="brandrow"><div class="brandmark"><div class="logo">£F</div><div><h1>World Cup Stock Exchange</h1><div class="tagline">Live market chaos • powered by your sheet + football-data.org</div></div></div><div class="right-tools"><button class="pillbtn" onclick="refreshData()">Refresh</button></div></div><nav id="nav"><button class="navbtn active" data-page="home">Trading Floor</button><button class="navbtn" data-page="table">League Table</button><button class="navbtn" data-page="fixtures">Fixtures</button><button class="navbtn" data-page="portfolios">Portfolios</button><button class="navbtn" data-page="rules">Rules</button></nav></header></div>
<main><section id="home" class="page active"></section><section id="table" class="page"></section><section id="fixtures" class="page"></section><section id="portfolios" class="page"></section><section id="rules" class="page"></section></main>


<script>
const SHEET_ID="1GRDmFQt8SI-IeFVGWwAVUFin99kp7re7jx4vZbkPpxA";
const TABLES={league:"Public_League_Table",fixtures:"Public_Fixtures",portfolios:"Public_Portfolios",rules:"Public_Rules"};
// Paste your deployed Apps Script Web App URL between the quotes below.
// Everyone still only uses the normal GitHub Pages link; this proxy keeps the football-data.org key out of GitHub.
const FOOTBALL_DATA_PROXY_URL="https://script.google.com/macros/s/AKfycbwF_82Hl4yBdVVSiHy58tGhvTqUx9tQ4JBSMwt53iHUjNyycmjRhQU1PMzq9dHzExL6/exec";
const state={league:[],fixtures:[],portfolios:[],rules:[],apiMatches:[],errors:[],lastRefresh:null,apiSource:"Sheet fallback",fixtureDayOffset:0,tableMoves:{}};

function clean(v){return String(v??"").trim()}
function esc(s){return String(s??"").replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function toNum(v){const n=Number(String(v??"").replace(/[^\d.-]/g,""));return isNaN(n)?0:n}
function normKey(k){return clean(k).replace(/\uFEFF/g,"").toLowerCase().replace(/[^a-z0-9]/g,"")}
function val(row,names){for(const name of names){const t=normKey(name);for(const k of Object.keys(row)){if(normKey(k)===t)return row[k]}}return""}
function slug(s){return clean(s).toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[’']/g,"").replace(/[^a-z0-9]+/g,"")}
function badge(t,c=""){return t?`<span class="badge ${c}">${esc(t)}</span>`:""}
function statusClass(s){s=slug(s);return s.includes("inplay")||s.includes("live")||s.includes("paused")?"red":s.includes("play")||s.includes("finish")?"green":s.includes("timed")||s.includes("schedule")?"blue":"purple"}
function statusBadge(s){return badge(s||"Scheduled",statusClass(s))}
function logoUrl(row){return clean(val(row,["Logo_URL","Logo URL","Logo","Team_Logo","Team Logo"]))}
function logoImg(row){const u=logoUrl(row);return u?`<img class="team-logo" src="${esc(u)}" alt="" loading="lazy" crossorigin="anonymous" onerror="this.style.display='none'">`:""}
function teamName(row){return clean(val(row,["Team_Name","Team Name","Investment_Team","Investment Team","Portfolio","Portfolio_Name","Portfolio Name"]))||clean(val(row,["Manager_Name","Manager Name","Manager"]))||"TBC"}
function managerName(row){return clean(val(row,["Manager_Name","Manager Name","Manager","Owner_Name","Owner Name","Owner"]))}
function totalPoints(row){return toNum(val(row,["Total_Points","Total Points","Points","Pts","Score"]))}
function wins(row){return toNum(val(row,["W","Wins","Win"]))}
function losses(row){return toNum(val(row,["L","Losses","Loss"]))}
function draws(row){return toNum(val(row,["D","Draws","Draw"]))}
function positivePts(row){return toNum(val(row,["Positive_PTS","Positive PTS","Positive Points","Positive","Plus_PTS","Plus Points","For","PF","Points_For","Points For"]))}
function negativePts(row){return toNum(val(row,["Negative_PTS","Negative PTS","Negative Points","Negative","Minus_PTS","Minus Points","Against","PA","Points_Against","Points Against"]))}
function nationName(row){return clean(val(row,["Nation","Country","Team","Nation_Name","Nation Name"]))}
function nationCode(row){return clean(val(row,["Nation_ID","Nation ID","Code","Nation_Code","Nation Code"]))}
function teamKey(row){return slug(teamName(row)||managerName(row)||logoUrl(row))}
function isFilledPortfolio(row){const t=teamName(row);if(!t||t==="TBC")return false;if(slug(t).includes("tbc")||slug(t).includes("placeholder"))return false;return true}
function leagueRows(){return [...state.league].filter(isFilledPortfolio).sort((a,b)=>totalPoints(b)-totalPoints(a)||teamName(a).localeCompare(teamName(b)))}
function teamDisplay(row){const team=teamName(row),mgr=managerName(row);return `<div class="team-cell">${logoImg(row)}<div class="team-name-stack"><b>${esc(team)}</b>${mgr&&mgr!==team?`<span class="small">${esc(mgr)}</span>`:""}</div></div>`}

function computeTableMoves(rows){let prev={};try{prev=JSON.parse(localStorage.getItem("WCSX_TABLE_POSITIONS")||"{}")||{}}catch(e){prev={}}
  const current={};const moves={};rows.forEach((r,i)=>{const k=teamKey(r);const pos=i+1;current[k]=pos;const old=prev[k];if(!old){moves[k]={dir:"same",delta:0,prev:pos,current:pos};return}const delta=old-pos;moves[k]={dir:delta>0?"up":delta<0?"down":"same",delta:Math.abs(delta),prev:old,current:pos}});
  state.tableMoves=moves;localStorage.setItem("WCSX_TABLE_POSITIONS",JSON.stringify(current));
}
function trendHtml(row){const m=state.tableMoves[teamKey(row)]||{dir:"same",delta:0};if(m.dir==="up")return `<span class="trend up" title="Up ${m.delta}">▲</span>`;if(m.dir==="down")return `<span class="trend down" title="Down ${m.delta}">▼</span>`;return `<span class="trend same" title="No change">–</span>`}

function getRowsFromGvizResponse(json){const cols=json.table.cols.map((c,i)=>clean(c.label||c.id||`Col${i+1}`));return json.table.rows.map(r=>{const o={};cols.forEach((c,i)=>{const cell=r.c[i];o[c]=cell?(cell.f??cell.v??""):""});return o}).filter(row=>Object.values(row).some(v=>clean(v)!==""))}
function loadSheet(key,sheetName){return new Promise(resolve=>{const cb="gviz_"+key+"_"+Math.random().toString(36).slice(2);const timeout=setTimeout(()=>{state.errors.push(`${sheetName}: load timed out`);cleanup();resolve([])},12000);function cleanup(){clearTimeout(timeout);try{delete window[cb]}catch(e){window[cb]=undefined}const s=document.getElementById(cb);if(s)s.remove()}window[cb]=json=>{try{if(json.status==="error")throw new Error(json.errors?.[0]?.detailed_message||"Google returned an error");const rows=getRowsFromGvizResponse(json);cleanup();resolve(rows)}catch(e){state.errors.push(`${sheetName}: ${e.message}`);cleanup();resolve([])}};const script=document.createElement("script");script.id=cb;script.onerror=()=>{state.errors.push(`${sheetName}: script load failed`);cleanup();resolve([])};script.src=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=responseHandler:${cb}&sheet=${encodeURIComponent(sheetName)}&tq=${encodeURIComponent("select *")}&_=${Date.now()}`;document.body.appendChild(script)})}
function getProxyUrl(){return (FOOTBALL_DATA_PROXY_URL||"").trim()}
async function loadApiMatches(){const proxy=getProxyUrl();if(!proxy||proxy.includes("PASTE_YOUR_APPS_SCRIPT_WEB_APP_URL_HERE"))return[];const url=proxy+(proxy.includes("?")?"&":"?")+"mode=matches&_="+Date.now();const res=await fetch(url,{cache:"no-store"});if(!res.ok)throw new Error(`Proxy HTTP ${res.status}`);const json=await res.json();if(!json.ok)throw new Error(json.error||"Proxy returned error");state.apiSource=`football-data.org • ${new Date(json.generatedAt).toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"})}`;return Array.isArray(json.matches)?json.matches:[]}

function fdStatus(m){const s=String(m.status||"").toUpperCase();if(["FINISHED","AWARDED"].includes(s))return"Played";if(["IN_PLAY","PAUSED","LIVE"].includes(s))return"In-play";if(["SCHEDULED","TIMED"].includes(s))return"Scheduled";return clean(m.status)||"Scheduled"}
function fdScore(m){const sc=m.score||{};const ft=sc.fullTime||{}, rt=sc.regularTime||{}, ht=sc.halfTime||{};const h=ft.home??rt.home??(fdStatus(m)==="In-play"?ht.home:undefined);const a=ft.away??rt.away??(fdStatus(m)==="In-play"?ht.away:undefined);if(h===null||h===undefined||a===null||a===undefined)return"";return `${h} - ${a}`}
function fdHome(m){return m.homeTeam?.shortName||m.homeTeam?.name||"TBD"}
function fdAway(m){return m.awayTeam?.shortName||m.awayTeam?.name||"TBD"}
function fdDate(m){const d=new Date(m.utcDate);if(isNaN(d))return{date:"",time:"",sort:0,dateTime:""};return{sort:d.getTime(),date:d.toLocaleDateString("en-GB",{weekday:"short",day:"2-digit",month:"short"}),time:d.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"}),dateTime:d.toLocaleString("en-GB",{weekday:"short",day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"})}}
function normalizeNation(n){let x=slug(n);const aliases={usa:"unitedstates",unitedstatesofamerica:"unitedstates",turkiye:"turkey",türkiye:"turkey",cotedivoire:"ivorycoast",caboverde:"capeverde",curacao:"curacao",curaçao:"curacao",congodr:"drcongo",democraticrepublicofcongo:"drcongo",czechrepublic:"czechia",bosniaherzegovina:"bosniaandherzegovina",bosnia:"bosniaandherzegovina",korearepublic:"southkorea",republicofkorea:"southkorea",drcongo:"drcongo"};return aliases[x]||x}
function ownersForNation(name,code=""){const n=normalizeNation(name),c=clean(code).toUpperCase();return state.portfolios.filter(r=>normalizeNation(nationName(r))===n || clean(nationCode(r)).toUpperCase()===c).slice(0,4)}
function ownerChips(name,code){const owners=ownersForNation(name,code);if(!owners.length)return"";return `<div class="owners">${owners.map(o=>`<span class="owner-chip">${logoImg(o)}${esc(teamName(o))}</span>`).join("")}</div>`}
function apiMatchCard(m,forceLive=false){const st=fdStatus(m),d=fdDate(m),score=fdScore(m)||"v",live=st==="In-play"||forceLive;const home=fdHome(m),away=fdAway(m);const stage=clean(m.stage||m.group||"");const minute=m.minute||m.score?.duration||"";return `<div class="match-card ${live?"live":""}"><div class="match-top"><div>${live?`<span class="pulse"></span> `:""}${statusBadge(st)} ${stage?badge(stage,"purple"):""}</div><div class="small">${esc(d.dateTime)}${minute?` • ${esc(minute)}`:""}</div></div><div class="fixture-row"><div class="side"><div class="nation">${esc(home)}</div>${ownerChips(home,m.homeTeam?.tla)}</div><div class="score">${esc(score)}</div><div class="side away"><div class="nation">${esc(away)}</div>${ownerChips(away,m.awayTeam?.tla)}</div></div></div>`}
function compactApiFixture(m){const d=fdDate(m);return `<div class="compact-fixture"><div><div class="name">${esc(fdHome(m))}</div>${ownerChips(fdHome(m),m.homeTeam?.tla)}</div><div class="vs">${esc(fdScore(m)||d.time||"v")}</div><div class="away"><div class="name">${esc(fdAway(m))}</div>${ownerChips(fdAway(m),m.awayTeam?.tla)}</div></div>`}

function sheetStatus(row){return clean(val(row,["Status","Match_Status","Match Status"]))||"Scheduled"}
function fixtureDateSort(row){const raw=clean(val(row,["Date_Time","Date Time","Kickoff","Kick Off","UTCDate","UTC Date","Date"]));const d=new Date(raw);return isNaN(d)?0:d.getTime()}
function fixtureName(row){const a=clean(val(row,["Team_A","Team A","Home","Home_Team"]));const b=clean(val(row,["Team_B","Team B","Away","Away_Team"]));return{a,b}}
function scoreDisplay(row){return clean(val(row,["Score_Display","Score Display","Score","Result"]))}
function fallbackFixtureCard(row){const n=fixtureName(row);return `<div class="match-card"><div class="match-top"><div>${statusBadge(sheetStatus(row))}</div><div class="small">${esc(clean(val(row,["Date","Date_Time","Date Time","Kickoff"])))}</div></div><div class="fixture-row"><div class="side"><div class="nation">${esc(n.a)}</div>${ownerChips(n.a)}</div><div class="score">${esc(scoreDisplay(row)||"v")}</div><div class="side away"><div class="nation">${esc(n.b)}</div>${ownerChips(n.b)}</div></div></div>`}

function gameDayStart(offset=0){const d=new Date();d.setHours(12,0,0,0);if(Date.now()<d.getTime())d.setDate(d.getDate()-1);d.setDate(d.getDate()+offset);return d}
function gameDayEnd(offset=0){const d=gameDayStart(offset);d.setDate(d.getDate()+1);return d}
function gameDayLabel(offset=0){const s=gameDayStart(offset),e=gameDayEnd(offset);return `${s.toLocaleDateString("en-GB",{weekday:"short",day:"2-digit",month:"short"})} 12:00 → ${e.toLocaleDateString("en-GB",{weekday:"short",day:"2-digit",month:"short"})} 12:00`}
function apiMatchesForDay(offset=0){const s=gameDayStart(offset).getTime(),e=gameDayEnd(offset).getTime();return state.apiMatches.filter(m=>{const t=fdDate(m).sort;return t>=s&&t<e}).sort((a,b)=>fdDate(a).sort-fdDate(b).sort)}
function sheetFixturesForDay(offset=0){const s=gameDayStart(offset).getTime(),e=gameDayEnd(offset).getTime();return state.fixtures.filter(r=>{const t=fixtureDateSort(r);return t>=s&&t<e}).sort((a,b)=>fixtureDateSort(a)-fixtureDateSort(b))}
function liveMatches(){return state.apiMatches.filter(m=>fdStatus(m)==="In-play").sort((a,b)=>fdDate(a).sort-fdDate(b).sort)}
function upcomingMatchesForCurrentWindow(){return apiMatchesForDay(0).filter(m=>fdStatus(m)!=="Played").sort((a,b)=>fdDate(a).sort-fdDate(b).sort)}
function fallbackUpcomingHtml(){const rows=sheetFixturesForDay(0).filter(r=>!slug(sheetStatus(r)).includes("played"));return rows.map(fallbackFixtureCard).join("")||`<div class="empty-row">No upcoming fixtures in this 24-hour window.</div>`}

function compactTableHtml(rows){return `<table><thead><tr><th>#</th><th></th><th>Portfolio</th><th>Pts</th></tr></thead><tbody>${rows.map((r,i)=>`<tr><td><span class="pos ${i<3?"top":""}">${i+1}</span></td><td>${trendHtml(r)}</td><td>${teamDisplay(r)}</td><td class="points">${totalPoints(r)}</td></tr>`).join("")}</tbody></table>`}
function fullTableHtml(rows){return `<table><thead><tr><th>#</th><th></th><th>Portfolio</th><th>W</th><th>L</th><th>D</th><th>+PTS</th><th>-PTS</th><th>Pts</th></tr></thead><tbody>${rows.map((r,i)=>`<tr><td><span class="pos ${i<3?"top":""}">${i+1}</span></td><td>${trendHtml(r)}</td><td>${teamDisplay(r)}</td><td><span class="table-stat">${wins(r)}</span></td><td><span class="table-stat">${losses(r)}</span></td><td><span class="table-stat">${draws(r)}</span></td><td><span class="table-stat good">${positivePts(r)}</span></td><td><span class="table-stat bad">${negativePts(r)}</span></td><td class="points">${totalPoints(r)}</td></tr>`).join("")}</tbody></table>`}

function renderHome(){const home=document.getElementById("home");const table=leagueRows();const live=liveMatches();const upcoming=upcomingMatchesForCurrentWindow();const matchCentre=live.length?`<div class="card match-centre clean-card"><div class="card-header"><div><div class="kicker">Live Games</div><h3 class="section-title">${live.length} match${live.length>1?"es":""} in-play</h3><div class="window-note">Current game day: ${esc(gameDayLabel(0))}</div></div>${badge(state.apiSource,"red")}</div><div class="grid ${live.length>1?"two":""}">${live.map(m=>apiMatchCard(m,true)).join("")}</div></div>`:`<div class="card match-centre clean-card"><div class="card-header"><div><div class="kicker">Next Up</div><h3 class="section-title">Upcoming games</h3><div class="window-note">Current game day: ${esc(gameDayLabel(0))}</div></div>${badge(state.apiSource,"blue")}</div><div class="grid two">${upcoming.map(m=>apiMatchCard(m)).join("")||fallbackUpcomingHtml()}</div></div>`;
  home.innerHTML=`${matchCentre}<div class="grid two" style="margin-top:14px"><div class="card"><div class="card-header"><div><div class="kicker">Upcoming Games</div><h3 class="section-title">This market window</h3><div class="window-note">12:00 to 12:00 game-day view</div></div><button class="cta" onclick="showPage('fixtures')">Full fixtures</button></div><div class="fixture-list">${upcoming.map(compactApiFixture).join("")||fallbackUpcomingHtml()}</div></div><div class="card"><div class="card-header"><div><div class="kicker">WCSX Table</div><h3 class="section-title">Top portfolios</h3></div><button class="cta" onclick="showPage('table')">Full table</button></div>${compactTableHtml(table.slice(0,8))}</div></div>${state.errors.length?`<div class="error">${state.errors.map(esc).join("<br>")}</div>`:""}`}

function renderTable(){const rows=leagueRows();document.getElementById("table").innerHTML=`<div class="card" id="league-capture"><div class="card-header"><div><div class="kicker">League Table</div><h2 class="section-title">WCSX standings</h2><div class="window-note">Arrows show movement since the last dashboard refresh. +PTS / -PTS need matching columns in Public_League_Table.</div></div><div class="table-actions">${badge("Live from Sheet","blue")}<button class="cta" onclick="captureElement('league-capture','wcsx-league-table.png')">📸 Table</button></div></div>${fullTableHtml(rows)}</div>`}
function renderFixtures(){const api=state.apiMatches.length;const matches=api?apiMatchesForDay(state.fixtureDayOffset):[];const sheetRows=api?[]:sheetFixturesForDay(state.fixtureDayOffset);const title=state.fixtureDayOffset===0?"Current game day":state.fixtureDayOffset>0?`Game day +${state.fixtureDayOffset}`:`Game day ${state.fixtureDayOffset}`;const items=api?matches.map(m=>apiMatchCard(m)).join(""):sheetRows.map(fallbackFixtureCard).join("");document.getElementById("fixtures").innerHTML=`<div class="card" id="fixtures-capture"><div class="card-header"><div><div class="kicker">Fixtures</div><h2 class="section-title">${esc(title)}</h2><div class="window-note">${esc(gameDayLabel(state.fixtureDayOffset))}</div></div><div class="table-actions">${badge(api?state.apiSource:"Sheet fallback",api?"green":"blue")}<button class="cta" onclick="changeFixtureDay(-1)">◀</button><button class="cta" onclick="state.fixtureDayOffset=0;renderFixtures()">Today</button><button class="cta" onclick="changeFixtureDay(1)">▶</button><button class="cta" onclick="captureElement('fixtures-capture','wcsx-fixtures-${state.fixtureDayOffset}.png')">📸 Fixtures</button></div></div><div class="grid two">${items||"<div class='empty-row'>No fixtures found for this 12:00 → 12:00 window.</div>"}</div></div>`}
function changeFixtureDay(delta){state.fixtureDayOffset+=delta;renderFixtures()}
function renderPortfolios(){const groups={};state.portfolios.forEach(r=>{const t=teamName(r);if(!t||t==="TBC")return;(groups[t]??=[]).push(r)});document.getElementById("portfolios").innerHTML=`<div class="grid two">${Object.entries(groups).map(([t,rows])=>`<div class="card"><div class="card-header"><div>${teamDisplay(rows[0])}</div>${badge(`${rows.length} nations`,"gold")}</div><div class="fixture-list">${rows.map(r=>`<div class="compact-fixture"><div class="name">${esc(nationName(r))}</div><div class="vs">${esc(nationCode(r))}</div><div class="away small">Group ${esc(clean(val(r,["Group"])))}</div></div>`).join("")}</div></div>`).join("")}</div>`}
function renderRules(){document.getElementById("rules").innerHTML=`<div class="card"><div class="card-header"><div><div class="kicker">Rules</div><h2 class="section-title">Scoring rules</h2></div></div>${state.rules.length?`<table><tbody>${state.rules.map(r=>`<tr>${Object.values(r).slice(0,4).map(v=>`<td>${esc(v)}</td>`).join("")}</tr>`).join("")}</tbody></table>`:`<p class="muted">Rules tab loaded from your Sheet. No rule rows found.</p>`}</div>`}
function renderAll(){renderHome();renderTable();renderFixtures();renderPortfolios();renderRules()}
async function refreshData(){state.errors=[];try{const [league,fixtures,portfolios,rules]=await Promise.all([loadSheet("league",TABLES.league),loadSheet("fixtures",TABLES.fixtures),loadSheet("portfolios",TABLES.portfolios),loadSheet("rules",TABLES.rules)]);state.league=league;state.fixtures=fixtures;state.portfolios=portfolios;state.rules=rules}catch(e){state.errors.push(e.message)}try{state.apiMatches=await loadApiMatches()}catch(e){state.errors.push("API: "+e.message);state.apiMatches=[];state.apiSource="Sheet fallback"}state.lastRefresh=new Date();computeTableMoves(leagueRows());renderAll()}
function showPage(id){document.querySelectorAll(".page").forEach(p=>p.classList.toggle("active",p.id===id));document.querySelectorAll(".navbtn").forEach(b=>b.classList.toggle("active",b.dataset.page===id));window.scrollTo({top:0,behavior:"smooth"})}

document.getElementById("nav").addEventListener("click",e=>{const b=e.target.closest(".navbtn");if(b)showPage(b.dataset.page)});

function toast(msg){let el=document.getElementById("screenshot-toast");if(!el){el=document.createElement("div");el.id="screenshot-toast";el.className="screenshot-toast";document.body.appendChild(el)}el.textContent=msg;el.classList.add("show");setTimeout(()=>el.classList.remove("show"),2600)}
function loadHtml2Canvas(){return new Promise((resolve,reject)=>{if(window.html2canvas)return resolve(window.html2canvas);const s=document.createElement("script");s.src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js";s.onload=()=>resolve(window.html2canvas);s.onerror=()=>reject(new Error("Could not load screenshot tool"));document.head.appendChild(s)})}
async function captureElement(id,filename){try{toast("Building image...");const el=document.getElementById(id);if(!el)throw new Error("Nothing to capture");const html2canvas=await loadHtml2Canvas();const canvas=await html2canvas(el,{backgroundColor:"#050914",scale:2,useCORS:true,allowTaint:false,logging:false});canvas.toBlob(async blob=>{if(!blob)throw new Error("Could not create image");try{if(navigator.clipboard&&window.ClipboardItem){await navigator.clipboard.write([new ClipboardItem({"image/png":blob})]);toast("Copied image. Also downloading PNG...")}else{toast("Downloading PNG...")}}catch(e){toast("Downloading PNG...")}const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=filename||"wcsx-image.png";document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(a.href),2000)},"image/png") }catch(e){toast("Screenshot failed: "+e.message)}}

refreshData();setInterval(refreshData,30000);
</script>

</body>
