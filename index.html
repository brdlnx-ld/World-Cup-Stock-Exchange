<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>World Cup Stock Exchange</title>
  <style>
    :root{
      --navy:#06101f;
      --navy2:#091b35;
      --panel:#102545;
      --panel2:#15335e;
      --line:rgba(255,255,255,.16);
      --text:#f8fbff;
      --muted:#adc1db;
      --gold:#ffd166;
      --green:#20e38a;
      --red:#ff4d6d;
      --blue:#42b7ff;
      --cyan:#65f2ff;
      --purple:#a96cff;
      --orange:#ff9f1c;
      --white:#ffffff;
      --shadow:0 18px 46px rgba(0,0,0,.36);
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      min-height:100vh;
      color:var(--text);
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:
        radial-gradient(circle at 10% 5%, rgba(255,77,109,.25), transparent 24%),
        radial-gradient(circle at 88% 8%, rgba(66,183,255,.25), transparent 30%),
        radial-gradient(circle at 52% 0%, rgba(255,209,102,.16), transparent 34%),
        linear-gradient(180deg,#050a16 0%,#071326 42%,#050a16 100%);
      overflow-x:hidden;
    }
    body:before{
      content:"";
      position:fixed;inset:0;
      pointer-events:none;
      background:
        linear-gradient(90deg, rgba(255,255,255,.035) 1px, transparent 1px),
        linear-gradient(rgba(255,255,255,.028) 1px, transparent 1px);
      background-size:42px 42px;
      mask-image:linear-gradient(to bottom, rgba(0,0,0,.9), transparent 82%);
    }
    body:after{
      content:"";
      position:fixed;inset:auto -10vw -18vh -10vw;height:36vh;
      background:radial-gradient(ellipse at center, rgba(32,227,138,.18), transparent 62%);
      pointer-events:none;
    }

    .topbar{
      position:sticky;top:0;z-index:30;
      background:rgba(5,10,22,.82);
      border-bottom:1px solid var(--line);
      backdrop-filter:blur(16px);
    }
    header{max-width:1240px;margin:0 auto;padding:16px 18px 12px}
    .brandrow{display:flex;align-items:center;justify-content:space-between;gap:16px}
    .brandmark{display:flex;align-items:center;gap:12px}
    .logo{
      width:50px;height:50px;border-radius:17px;
      display:grid;place-items:center;
      background:
        radial-gradient(circle at 30% 28%, #fff 0 10%, transparent 11%),
        conic-gradient(from 210deg, var(--green), var(--cyan), var(--gold), var(--red), var(--green));
      color:#071326;font-weight:1000;
      box-shadow:0 0 26px rgba(101,242,255,.32), inset 0 0 0 2px rgba(255,255,255,.28);
      transform:skew(-7deg);
    }
    h1{margin:0;font-size:34px;letter-spacing:-.04em;line-height:1}
    .tagline{color:var(--muted);font-size:13px;margin-top:5px}
    .menuToggle{
      display:none;border:1px solid var(--line);
      color:var(--text);background:rgba(255,255,255,.07);
      border-radius:12px;padding:10px 12px;font-weight:950;cursor:pointer;
    }
    nav{display:flex;gap:8px;flex-wrap:wrap;margin-top:15px}
    button.tab{
      border:1px solid rgba(101,242,255,.26);
      background:rgba(8,20,42,.86);
      color:var(--text);
      border-radius:999px;
      padding:10px 14px;
      font-weight:950;
      cursor:pointer;
      transition:.15s transform,.15s border-color,.15s background;
    }
    button.tab:hover{transform:translateY(-1px);border-color:rgba(101,242,255,.75)}
    button.tab.active{
      background:linear-gradient(135deg,var(--gold),#fff1a8);
      color:#06101f;
      border-color:transparent;
      box-shadow:0 0 24px rgba(255,209,102,.25);
    }

    main{max-width:1240px;margin:0 auto;padding:20px 18px 52px;position:relative;z-index:1}
    .page{display:none}.page.active{display:block}

    .hero{
      position:relative;overflow:hidden;
      border:1px solid rgba(255,255,255,.18);
      border-radius:26px;
      background:
        linear-gradient(135deg,rgba(255,209,102,.18),rgba(66,183,255,.13) 42%,rgba(255,77,109,.10)),
        rgba(11,29,58,.74);
      box-shadow:var(--shadow);
      padding:22px;
    }
    .hero:after{
      content:"LIVE TRADING FLOOR";
      position:absolute;right:-30px;top:18px;
      font-size:52px;font-weight:1000;letter-spacing:3px;
      transform:rotate(7deg);
      color:rgba(255,255,255,.055);
      pointer-events:none;
    }
    .hero-inner{position:relative;z-index:1}
    .hero h2{margin:0 0 6px;font-size:32px;letter-spacing:-.04em}
    .hero p{margin:0;color:#d3e6ff;max-width:760px;line-height:1.45}
    .hero-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
    .cta{
      border:0;border-radius:15px;padding:12px 16px;
      font-weight:1000;cursor:pointer;text-decoration:none;
      color:#06101f;background:linear-gradient(135deg,var(--gold),#fff1a8);
      box-shadow:0 10px 22px rgba(0,0,0,.22);
    }
    .cta.secondary{background:rgba(255,255,255,.09);color:var(--text);border:1px solid rgba(255,255,255,.18)}

    .metric-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:14px}
    .grid{display:grid;gap:14px;margin-top:14px}
    .grid.trading{grid-template-columns:1.05fr .95fr}
    .grid.two{grid-template-columns:1fr 1fr}
    .card{
      background:linear-gradient(180deg,rgba(19,43,79,.93),rgba(9,23,48,.93));
      border:1px solid var(--line);
      border-radius:20px;
      padding:16px;
      box-shadow:var(--shadow);
    }
    .card-header{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:12px}
    .kicker{font-size:11px;text-transform:uppercase;letter-spacing:1.8px;color:var(--cyan);font-weight:1000}
    .big{font-size:32px;font-weight:1000;margin:7px 0 2px;line-height:1;letter-spacing:-.04em}
    .small{color:var(--muted);font-size:13px;line-height:1.35}
    .section-title{font-size:22px;font-weight:1000;margin:0;letter-spacing:-.03em}
    .muted{color:var(--muted)}
    .pillrow{display:flex;flex-wrap:wrap;gap:7px}
    .badge{
      display:inline-flex;align-items:center;gap:6px;
      border-radius:999px;padding:5px 9px;
      font-size:12px;font-weight:1000;white-space:nowrap;
      border:1px solid rgba(255,255,255,.13);
      background:rgba(255,255,255,.07);
    }
    .badge.gold{background:rgba(255,209,102,.15);color:#ffe6a4}
    .badge.green{background:rgba(32,227,138,.13);color:#96ffc9}
    .badge.blue{background:rgba(66,183,255,.14);color:#aee7ff}
    .badge.red{background:rgba(255,77,109,.15);color:#ffb1c0}
    .badge.purple{background:rgba(169,108,255,.14);color:#d9c6ff}

    .team-cell{display:flex;align-items:center;gap:10px;min-width:170px}
    .team-logo{
      width:36px;height:36px;border-radius:11px;object-fit:cover;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.16);
      flex:0 0 auto;
    }
    .team-logo.big{width:64px;height:64px;border-radius:18px;box-shadow:0 10px 26px rgba(0,0,0,.25)}
    .team-logo.small{width:28px;height:28px;border-radius:9px}
    .team-name-stack{display:flex;flex-direction:column;gap:2px}
    .points-burst{font-size:24px;font-weight:1000;color:var(--gold);letter-spacing:-.04em}

    .mini-table{display:flex;flex-direction:column;gap:8px}
    .mini-row{
      display:grid;grid-template-columns:40px minmax(0,1fr) auto;align-items:center;gap:10px;
      padding:9px;border-radius:14px;
      border:1px solid rgba(255,255,255,.09);
      background:rgba(255,255,255,.045);
    }
    .mini-row.leader{border-color:rgba(255,209,102,.35);background:rgba(255,209,102,.09)}
    .pos{
      width:32px;height:32px;border-radius:11px;display:grid;place-items:center;
      background:rgba(255,255,255,.08);font-weight:1000;
    }
    .podium1{background:linear-gradient(135deg,var(--gold),#fff2a8);color:#07101f}
    .podium2{background:linear-gradient(135deg,#e4edf7,#8998aa);color:#07101f}
    .podium3{background:linear-gradient(135deg,#ffb15e,#9b5d1d);color:#07101f}

    .match-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(235px,1fr));gap:10px}
    .match-card{
      border:1px solid rgba(255,255,255,.11);
      background:rgba(255,255,255,.045);
      border-radius:16px;
      padding:12px;
      min-height:126px;
    }
    .match-card.played{border-color:rgba(32,227,138,.22)}
    .match-card.upcoming{border-color:rgba(255,209,102,.24)}
    .fixture-line{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:8px}
    .fixture-team{font-weight:950;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .score-box{
      min-width:54px;text-align:center;font-weight:1000;
      background:rgba(0,0,0,.26);border-radius:12px;padding:7px 8px;
      border:1px solid rgba(255,255,255,.10);
    }
    .owner-list{display:flex;flex-direction:column;gap:5px;margin-top:10px}
    .owner-chip{
      display:flex;align-items:center;gap:7px;
      font-size:12px;border-radius:999px;padding:5px 8px;
      background:rgba(66,183,255,.10);
      border:1px solid rgba(66,183,255,.18);
      color:#d9f4ff;
    }

    .vidiprinter-card .vidi-body-inline{
      background:#fff;color:#111;border-radius:14px;min-height:390px;
      max-height:520px;overflow:auto;padding:8px;border:1px solid rgba(255,255,255,.10);
    }
    .vidi-fallback{padding:18px;color:#06101f;background:#fff;border-radius:12px}
    .vidi-fallback a{color:#005bbb;font-weight:900}

    .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
    input.search, select.filter{
      background:rgba(7,16,36,.92);
      border:1px solid rgba(101,242,255,.24);
      border-radius:12px;color:var(--text);
      padding:11px 12px;min-width:170px;outline:none;
    }

    table{
      width:100%;border-collapse:separate;border-spacing:0;
      background:rgba(10,25,52,.88);
      border:1px solid var(--line);
      border-radius:18px;overflow:hidden;
      box-shadow:var(--shadow);
    }
    th,td{
      border-bottom:1px solid rgba(255,255,255,.085);
      padding:12px 10px;text-align:left;font-size:13px;vertical-align:middle;
    }
    th{
      background:linear-gradient(180deg,rgba(101,242,255,.13),rgba(255,255,255,.04));
      font-size:11px;text-transform:uppercase;letter-spacing:.7px;color:#f2fbff;
      position:sticky;top:104px;z-index:5;
    }
    tr:hover td{background:rgba(101,242,255,.045)}
    tr:last-child td{border-bottom:none}
    .num{text-align:right;font-variant-numeric:tabular-nums}
    .rank-row-1 td{background:rgba(255,209,102,.075)}
    .rank-row-2 td{background:rgba(66,183,255,.055)}
    .rank-row-3 td{background:rgba(255,159,28,.05)}

    .portfolio-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:14px}
    .portfolio-card{position:relative;overflow:hidden}
    .portfolio-card:after{
      content:"";position:absolute;right:-40px;top:-40px;width:140px;height:140px;border-radius:50%;
      background:radial-gradient(circle,rgba(101,242,255,.13),transparent 68%);
      pointer-events:none;
    }
    .portfolio-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px;position:relative;z-index:1}
    .nation-list{display:grid;gap:8px;position:relative;z-index:1}
    .nation-chip{
      display:flex;justify-content:space-between;gap:8px;align-items:center;
      background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.08);
      border-radius:13px;padding:9px;
    }

    .rules-wrap{display:grid;grid-template-columns:minmax(0,1.1fr) minmax(300px,.9fr);gap:14px}
    .rules-list li{margin:0 0 9px;line-height:1.45}
    .download{
      display:inline-block;text-decoration:none;border-radius:12px;
      background:linear-gradient(135deg,var(--cyan),#9dffe7);color:#06101f;
      padding:11px 14px;font-weight:1000;margin-top:10px;
    }

    .floating-actions{
      position:fixed;right:18px;bottom:18px;z-index:45;
      display:flex;flex-direction:column;gap:10px;align-items:flex-end;
    }
    .float-btn{
      display:flex;align-items:center;gap:9px;
      border:1px solid rgba(255,255,255,.18);
      border-radius:999px;padding:12px 14px;
      color:#06101f;text-decoration:none;font-weight:1000;
      box-shadow:0 12px 30px rgba(0,0,0,.35);
      cursor:pointer;transition:.15s transform,.15s filter;font-size:14px;
    }
    .float-btn:hover{transform:translateY(-2px);filter:brightness(1.08)}
    .float-vidi{background:linear-gradient(135deg,var(--cyan),#9dffe7)}
    .float-whatsapp{background:linear-gradient(135deg,#25D366,#b9ffcf)}
    .float-icon{width:22px;height:22px;border-radius:50%;background:rgba(6,16,29,.13);display:grid;place-items:center;font-size:14px}

    .debug{display:none;font-size:12px;color:#8fd7ff;margin-top:14px}.show-debug .debug{display:block}.ok{color:var(--green)}.err{color:var(--red)}
    .empty{color:var(--muted);padding:16px;border:1px dashed rgba(255,255,255,.16);border-radius:14px;background:rgba(255,255,255,.04)}

    @media(max-width:900px){
      header{padding:12px}
      h1{font-size:23px}
      .tagline{font-size:12px}
      .logo{width:42px;height:42px;border-radius:13px}
      .menuToggle{display:block}
      nav{display:none}
      nav.open{
        display:grid;grid-template-columns:1fr 1fr;position:fixed;left:12px;right:12px;top:74px;
        background:rgba(5,8,20,.97);border:1px solid var(--line);border-radius:18px;
        padding:12px;box-shadow:var(--shadow);z-index:40
      }
      button.tab{width:100%;text-align:center;padding:11px 10px;font-size:13px}
      main{padding:14px 12px 96px}
      .hero{padding:17px;border-radius:20px}
      .hero h2{font-size:24px}
      .hero:after{display:none}
      .metric-grid,.grid.trading,.grid.two,.rules-wrap{grid-template-columns:1fr}
      .match-grid{grid-template-columns:1fr}
      .toolbar{display:grid;grid-template-columns:1fr;gap:8px}
      input.search,select.filter{width:100%;min-width:0}
      table{display:block;overflow-x:auto;white-space:nowrap;border-radius:14px}
      th{position:static}
      th,td{padding:10px 8px;font-size:12px}
      .floating-actions{left:10px;right:10px;bottom:10px;display:grid;grid-template-columns:1fr 1fr;gap:8px;align-items:stretch}
      .float-btn{justify-content:center;padding:11px 9px;font-size:12px}
      .vidiprinter-card .vidi-body-inline{max-height:420px}
    }
  </style>
</head>
<body>
<div class="topbar">
<header>
  <div class="brandrow">
    <div class="brandmark">
      <div class="logo">£F</div>
      <div>
        <h1>World Cup Stock Exchange</h1>
        <div class="tagline">48 nations. One market. Absolute spreadsheet violence.</div>
      </div>
    </div>
    <button class="menuToggle" onclick="document.querySelector('nav').classList.toggle('open')">☰ Menu</button>
  </div>
  <nav>
    <button class="tab active" data-page="home">Trading Floor</button>
    <button class="tab" data-page="table">League Table</button>
    <button class="tab" data-page="fixtures">Fixtures</button>
    <button class="tab" data-page="portfolios">Portfolios</button>
    <button class="tab" data-page="rules">Rules</button>
  </nav>
</header>
</div>

<main>
  <section id="home" class="page active">
  <div id="homeDynamic"></div>
  <div class="card vidiprinter-card" id="vidiprinterPanel" style="margin-top:14px">
    <div class="card-header">
      <div><div class="kicker">Live Feed</div><h3 class="section-title">Vidiprinter</h3></div>
      <a class="cta secondary" href="https://www.footballwebpages.co.uk/vidiprinter" target="_blank" rel="noopener">Open</a>
    </div>
    <div class="vidi-body-inline">
      <div class="fwp-embed" data-url="vidiprinter"></div>
      <noscript><div class="vidi-fallback">Enable JavaScript to view the vidiprinter.</div></noscript>
    </div>
  </div>
</section>
  <section id="table" class="page"></section>
  <section id="fixtures" class="page"></section>
  <section id="portfolios" class="page"></section>
  <section id="rules" class="page"></section>
</main>

<div class="floating-actions">
  <button class="float-btn float-vidi" onclick="goPage('home');document.getElementById('vidiprinterPanel')?.scrollIntoView({behavior:'smooth',block:'center'});" title="Go to live vidiprinter">
    <span class="float-icon">⚡</span>
    <span>Vidiprinter</span>
  </button>
  <a class="float-btn float-whatsapp" href="https://chat.whatsapp.com/IOgPcuQc7BxI0Q3pXG3Iyx" target="_blank" rel="noopener" title="Join WhatsApp group">
    <span class="float-icon">💬</span>
    <span>WhatsApp</span>
  </a>
</div>

<script>
const SHEET_ID = "1GRDmFQt8SI-IeFVGWwAVUFin99kp7re7jx4vZbkPpxA";
const TABLES = {
  league: "Public_League_Table",
  fixtures: "Public_Fixtures",
  portfolios: "Public_Portfolios",
  rules: "Public_Rules"
};
const state = { league:[], fixtures:[], portfolios:[], rules:[], errors:[] };

if (new URLSearchParams(window.location.search).get("debug") === "1") {
  document.body.classList.add("show-debug");
}

function normKey(k){return String(k??"").replace(/\uFEFF/g,"").trim().toLowerCase().replace(/[^a-z0-9]/g,"")}
function val(row,names){for(const name of names){const t=normKey(name);for(const k of Object.keys(row)){if(normKey(k)===t)return row[k]}}return""}
function clean(v){return String(v??"").trim()}
function toNum(v){const n=Number(String(v??"").replace(/[^\d.-]/g,''));return isNaN(n)?0:n}
function esc(s){return String(s??"").replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function slug(s){return clean(s).toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[’']/g,"").replace(/[^a-z0-9]+/g,"")}
function badge(text,type=""){return text?`<span class="badge ${type}">${esc(text)}</span>`:""}
function statusBadge(s){const x=slug(s||"scheduled"); let c=x.includes("played")||x.includes("fulltime")?"green":x.includes("scheduled")||x.includes("fixture")?"blue":x.includes("live")?"red":"purple"; return badge(s||"Scheduled",c)}
function formatNumber(n){return String(n ?? 0)}
function logoUrl(row){return clean(val(row,["Logo_URL","Logo URL","Logo","Team_Logo","Team Logo"]))}
function logoImg(row, cls=""){const url=logoUrl(row);return url?`<img class="team-logo ${cls}" src="${esc(url)}" alt="" loading="lazy" onerror="this.style.display='none'">`:""}
function teamName(row){return clean(val(row,["Team_Name","Team Name","Investment_Team","Investment Team"])) || clean(val(row,["Manager_Name","Manager Name","Manager"])) || "TBC"}
function managerName(row){return clean(val(row,["Manager_Name","Manager Name","Manager","Owner_Name","Owner Name","Owner"]))}
function totalPoints(row){return toNum(val(row,["Total_Points","Total Points","Points","Pts","Score"]))}
function playedCount(row){return clean(val(row,["Played","P","Games_Played","Games Played"]))}
function groupText(row){return clean(val(row,["Group","Group_Letter","Group Letter"]))}
function nationName(row){return clean(val(row,["Nation","Country","Team","Nation_Name","Nation Name"]))}
function nationCode(row){return clean(val(row,["Nation_ID","Nation ID","Code","Nation_Code","Nation Code"]))}
function teamDisplay(row, cls=""){
  const team = teamName(row);
  const manager = managerName(row);
  return `<div class="team-cell">${logoImg(row,cls)}<div class="team-name-stack"><b>${esc(team)}</b>${manager && manager !== team ? `<span class="small">${esc(manager)}</span>` : ""}</div></div>`;
}

function getRowsFromGvizResponse(json){
  const cols=json.table.cols.map((c,i)=>clean(c.label||c.id||`Col${i+1}`));
  return json.table.rows.map(r=>{const o={};cols.forEach((c,i)=>{const cell=r.c[i];o[c]=cell?(cell.f??cell.v??""):""});return o})
    .filter(row=>Object.values(row).some(v=>clean(v)!==""));
}
function loadSheet(key,sheetName){
  return new Promise(resolve=>{
    const cb="gviz_cb_"+key+"_"+Math.random().toString(36).slice(2);
    const timeout=setTimeout(()=>{state.errors.push(`${sheetName}: load timed out`);cleanup();resolve([])},12000);
    function cleanup(){clearTimeout(timeout);try{delete window[cb]}catch(e){window[cb]=undefined} const s=document.getElementById(cb); if(s)s.remove()}
    window[cb]=json=>{try{if(json.status==="error")throw new Error(json.errors?.[0]?.detailed_message||"Google returned an error");const rows=getRowsFromGvizResponse(json);cleanup();resolve(rows)}catch(e){state.errors.push(`${sheetName}: ${e.message}`);cleanup();resolve([])}};
    const script=document.createElement("script");script.id=cb;script.onerror=()=>{state.errors.push(`${sheetName}: script load failed`);cleanup();resolve([])};
    script.src=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=responseHandler:${cb}&sheet=${encodeURIComponent(sheetName)}&tq=${encodeURIComponent("select *")}`;
    document.body.appendChild(script);
  });
}

function validLeagueRows(){return state.league.filter(r=>managerName(r)||teamName(r)!=="TBC")}
function leagueSorted(){return validLeagueRows().sort((a,b)=>totalPoints(b)-totalPoints(a))}
function portfolioRows(){return state.portfolios.filter(r=>nationName(r)||managerName(r)||teamName(r)!=="TBC")}
function portfoliosByTeam(){
  const groups={};
  portfolioRows().forEach(r=>{
    const key=teamName(r);
    if(!groups[key]) groups[key]=[];
    groups[key].push(r);
  });
  return groups;
}
function buildNationOwnership(){
  const map = {};
  portfolioRows().forEach(r=>{
    const nation = nationName(r);
    const code = nationCode(r);
    if(!nation && !code) return;
    const item = { nation, code, manager:managerName(r), team:teamName(r), row:r };
    [nation, code].filter(Boolean).forEach(k=>map[slug(k)]=item);

    const aliases = {
      "southkorea":["korearepublic","korea"],
      "bosniaandherzegovina":["bosniaherzegovina","bosnia"],
      "unitedstates":["usa","usmnt","america"],
      "turkiye":["turkey"],
      "cotedivoire":["ivorycoast","cotedivoire"],
      "caboverde":["capeverde"],
      "congodr":["drcongo","democraticrepublicofcongo"],
      "curacao":["curaçao"],
      "czechia":["czechrepublic"],
      "saudiarabia":["ksa"]
    };
    const nslug=slug(nation);
    (aliases[nslug]||[]).forEach(a=>map[a]=item);
  });
  return map;
}
function ownerForNation(name){
  if(!name) return null;
  const map=buildNationOwnership();
  const s=slug(name);
  if(map[s]) return map[s];
  const found=Object.keys(map).filter(k=>k && (s.includes(k)||k.includes(s))).sort((a,b)=>b.length-a.length)[0];
  return found?map[found]:null;
}

function fixtureA(row){return clean(val(row,["Team_A","Team A","Home","Home_Team","Home Team","Nation_A","Nation A"]))}
function fixtureB(row){return clean(val(row,["Team_B","Team B","Away","Away_Team","Away Team","Nation_B","Nation B"]))}
function fixtureStatus(row){return clean(val(row,["Status","Match_Status","Match Status"])) || "Scheduled"}
function fixtureScore(row){
  const direct=clean(val(row,["Score","Result","Full_Time","Full Time"]));
  if(direct) return direct;
  const a=clean(val(row,["A_Goals","A Goals","AGoals","Home_Goals","Home Goals"]));
  const b=clean(val(row,["B_Goals","B Goals","BGoals","Away_Goals","Away Goals"]));
  return (a!==""||b!=="")?`${a||0}-${b||0}`:"v";
}
function fixtureDate(row){return clean(val(row,["Date","UK_Date","UK Date","Kickoff_Date","Kickoff Date","Match_Date","Match Date"]))}
function fixtureTime(row){return clean(val(row,["Time","UK_Time","UK Time","Kickoff_Time","Kickoff Time","Kick_Off","Kick Off"]))}
function fixtureDateTime(row){
  const dt=clean(val(row,["DateTime","Date_Time","Date Time","Kickoff","Kickoff_UK","Kickoff UK"]));
  if(dt) return dt;
  return [fixtureDate(row), fixtureTime(row)].filter(Boolean).join(" • ") || "TBC";
}
function fixtureStage(row){return clean([val(row,["Stage"]), val(row,["Group"]), val(row,["Round"])].filter(Boolean).join(" • "))}
function isPlayed(row){const s=slug(fixtureStatus(row)); return s.includes("played")||s.includes("fulltime")||s==="ft"||s.includes("complete")}
function recentResults(){
  return state.fixtures.filter(isPlayed).slice(-4).reverse();
}
function upcomingFixtures(){
  return state.fixtures.filter(r=>!isPlayed(r)).slice(0,4);
}

function ownerChipsForFixture(row){
  const a=fixtureA(row), b=fixtureB(row);
  const owners=[ownerForNation(a),ownerForNation(b)].filter(Boolean);
  return owners.map(o=>`<div class="owner-chip">${logoImg(o.row,"small")}<span><b>${esc(o.nation||o.code)}</b> — ${esc(o.team)} <span class="muted">(${esc(o.manager)})</span></span></div>`).join("");
}
function renderMatchCard(row,type){
  const a=fixtureA(row)||"TBC";
  const b=fixtureB(row)||"TBC";
  return `<div class="match-card ${type}">
    <div class="pillrow">${statusBadge(fixtureStatus(row))}${fixtureStage(row)?badge(fixtureStage(row),"purple"):""}</div>
    <div class="fixture-line">
      <div class="fixture-team">${esc(a)}</div>
      <div class="score-box">${esc(fixtureScore(row))}</div>
      <div class="fixture-team" style="text-align:right">${esc(b)}</div>
    </div>
    <div class="small" style="margin-top:8px">${esc(fixtureDateTime(row))}</div>
    <div class="owner-list">${ownerChipsForFixture(row) || `<span class="small">No WCSX owner matched yet.</span>`}</div>
  </div>`;
}

function renderCompactTable(rows,limit=8){
  if(!rows.length) return `<div class="empty">No league data loaded yet.</div>`;
  return `<div class="mini-table">` + rows.slice(0,limit).map((r,i)=>{
    const pos=i+1;
    return `<div class="mini-row ${pos===1?'leader':''}">
      <span class="pos ${pos===1?'podium1':pos===2?'podium2':pos===3?'podium3':''}">${pos}</span>
      ${teamDisplay(r,"small")}
      <div class="points-burst">${esc(formatNumber(totalPoints(r)))}</div>
    </div>`;
  }).join("") + `</div>`;
}

          <div><div class="kicker">Condensed Table</div><h3 class="section-title">Position • Logo • Points</h3></div>

}

function renderTable(rows, columns){
  if(!rows.length)return `<div class="empty">No data loaded yet.</div>`;
  return `<table><thead><tr>${columns.map(c=>`<th class="${c.num?'num':''}">${esc(c.label)}</th>`).join("")}</tr></thead><tbody>`+
    rows.map((r,idx)=>`<tr class="${idx<3?`rank-row-${idx+1}`:''}">${columns.map(c=>`<td class="${c.num?'num':''}">${c.render?c.render(r,idx):esc(val(r,c.keys||[c.label]))}</td>`).join("")}</tr>`).join("")+
    `</tbody></table>`;
}

function renderLeague(){
  const rows=leagueSorted();
  document.getElementById("table").innerHTML=`
    <div class="card" style="margin-bottom:14px">
      <div class="card-header">
        <div><div class="kicker">League Table</div><h2 class="section-title">Current Market Standings</h2><div class="small">Cleaner table view: team badge, manager, played and points.</div></div>
      </div>
    </div>
    ${renderTable(rows,[
      {label:"Pos",render:(r,i)=>`<span class="pos ${i===0?'podium1':i===1?'podium2':i===2?'podium3':''}">${i+1}</span>`},
      {label:"Team",render:r=>teamDisplay(r)},
      {label:"Manager",render:r=>esc(managerName(r))},
      {label:"Played",num:true,render:r=>esc(playedCount(r))},
      {label:"Points",num:true,render:r=>`<b>${esc(formatNumber(totalPoints(r)))}</b>`},
      {label:"Captain",render:r=>clean(val(r,["Captain_Nation","Captain Nation","Captain"]))?badge(val(r,["Captain_Nation","Captain Nation","Captain"]),"gold"):""},
      {label:"Notes",keys:["Notes"]}
    ])}`;
}

function renderFixtures(){
  const statuses=[...new Set(state.fixtures.map(r=>clean(fixtureStatus(r))).filter(Boolean))].sort();
  const teams=[...new Set(state.fixtures.flatMap(r=>[fixtureA(r),fixtureB(r)]).filter(Boolean))].sort();
  document.getElementById("fixtures").innerHTML=`
    <div class="card" style="margin-bottom:14px">
      <div class="card-header">
        <div><div class="kicker">Fixtures</div><h2 class="section-title">Matches With WCSX Ownership</h2><div class="small">Date/time plus who owns each nation, where the portfolio data can match it.</div></div>
      </div>
    </div>
    <div class="toolbar">
      <select class="filter" id="fixtureStatus" onchange="applyFixtureFilters()">
        <option value="Upcoming" selected>Upcoming</option>
        <option value="Played">Played</option>
        <option value="All">All</option>
        ${statuses.filter(s=>!["Scheduled","Played"].includes(s)).map(s=>`<option>${esc(s)}</option>`).join("")}
      </select>
      <select class="filter" id="fixtureTeam" onchange="applyFixtureFilters()"><option value="All">All nations</option>${teams.map(s=>`<option>${esc(s)}</option>`).join("")}</select>
      <input class="search" id="fixtureSearch" placeholder="Search fixtures, managers, teams..." oninput="applyFixtureFilters()">
    </div>
    <div id="fixtureTable"></div>`;
  applyFixtureFilters();
}
function fixtureSearchText(row){
  const owners=[ownerForNation(fixtureA(row)),ownerForNation(fixtureB(row))].filter(Boolean).map(o=>`${o.team} ${o.manager} ${o.nation}`).join(" ");
  return Object.values(row).join(" ")+" "+owners;
}
function applyFixtureFilters(){
  const status=document.getElementById("fixtureStatus")?.value||"Upcoming";
  const team=document.getElementById("fixtureTeam")?.value||"All";
  const q=(document.getElementById("fixtureSearch")?.value||"").toLowerCase();
  let rows=state.fixtures.filter(r=>{
    const okS=status==="All" || (status==="Upcoming"?!isPlayed(r):status==="Played"?isPlayed(r):fixtureStatus(r)===status);
    const okTeam=team==="All" || fixtureA(r)===team || fixtureB(r)===team;
    const okQ=!q || fixtureSearchText(r).toLowerCase().includes(q);
    return okS && okTeam && okQ;
  });
  document.getElementById("fixtureTable").innerHTML=renderTable(rows,[
    {label:"Date/Time",render:r=>esc(fixtureDateTime(r))},
    {label:"Stage",render:r=>esc(fixtureStage(r))},
    {label:"Fixture",render:r=>`${esc(fixtureA(r))} <b>${esc(fixtureScore(r))}</b> ${esc(fixtureB(r))}`},
    {label:"WCSX Teams",render:r=>ownerChipsForFixture(r) || `<span class="small">No owner matched</span>`},
    {label:"Status",render:r=>statusBadge(fixtureStatus(r))},
    {label:"Notes",keys:["Notes"]}
  ]);
}

function portfolioScore(items){
  return items.reduce((a,r)=>a+toNum(val(r,["Total_Points","Total Points","Points","Pts"])),0);
}
function portfolioNextMatch(items){
  const names=items.map(r=>nationName(r)).filter(Boolean).map(slug);
  return state.fixtures.find(f=>!isPlayed(f) && (names.includes(slug(fixtureA(f))) || names.includes(slug(fixtureB(f)))));
}
function renderPortfolios(){
  document.getElementById("portfolios").innerHTML=`
    <div class="card" style="margin-bottom:14px">
      <div class="card-header">
        <div><div class="kicker">Portfolios</div><h2 class="section-title">Investment Teams</h2><div class="small">Grouped by WCSX team with nations, total points and next nation playing.</div></div>
      </div>
    </div>
    <div class="toolbar"><input class="search" id="portfolioSearch" placeholder="Search manager, team or nation..." oninput="renderPortfolioCards(this.value)"></div>
    <div id="portfolioCards"></div>`;
  renderPortfolioCards("");
}
function renderPortfolioCards(filter=""){
  const f=filter.toLowerCase();
  const groups=portfoliosByTeam();
  const html=Object.entries(groups).filter(([team,items])=>!f || (`${team} ${items.map(r=>Object.values(r).join(" ")).join(" ")}`).toLowerCase().includes(f)).map(([team,items])=>{
    const first=items[0]||{};
    const manager=managerName(first);
    const total=portfolioScore(items);
    const next=portfolioNextMatch(items);
    return `<div class="card portfolio-card">
      <div class="portfolio-head">
        <div style="display:flex;align-items:center;gap:12px">${logoImg(first,"big")}<div><h3 class="section-title">${esc(team)}</h3><div class="small">${esc(manager)}</div></div></div>
        <div class="points-burst">${esc(total)} pts</div>
      </div>
      <div class="pillrow" style="margin-bottom:12px">
        ${badge(`${items.filter(r=>nationName(r)).length} nations`,"blue")}
        ${next?badge(`Next: ${fixtureA(next)} v ${fixtureB(next)}`,"gold"):badge("No upcoming match found","purple")}
      </div>
      <div class="nation-list">
        ${items.filter(r=>nationName(r)).map(r=>{
          const nation=nationName(r), code=nationCode(r), group=groupText(r), pts=toNum(val(r,["Total_Points","Total Points","Points","Pts"]));
          return `<div class="nation-chip"><div><b>${esc(nation)}</b> <span class="muted">${esc(code)}</span><div class="pillrow" style="margin-top:5px">${group?badge(`Group ${group}`,"purple"):""}${clean(val(r,["Captain","Captain?","Captain_Nation","Captain Nation"]))?badge("Captain","gold"):""}</div></div><b>${esc(pts)}</b></div>`;
        }).join("") || "<div class='empty'>No nations found for this team yet.</div>"}
      </div>
    </div>`;
  }).join("");
  document.getElementById("portfolioCards").innerHTML=`<div class="portfolio-grid">${html || "<div class='empty'>No portfolio data found.</div>"}</div>`;
}

function goPage(page){
  document.querySelector(`button[data-page="${page}"]`)?.click();
}

document.querySelectorAll("button.tab").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll("button.tab").forEach(b=>b.classList.remove("active"));
    document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById(btn.dataset.page).classList.add("active");
    document.querySelector("nav").classList.remove("open");
  });
});

(async function init(){
  const entries=Object.entries(TABLES);
  const results=await Promise.all(entries.map(([key,name])=>loadSheet(key,name)));
  entries.forEach(([key],i)=>state[key]=results[i]);
  renderAll();
})();
