<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>World Cup Stock Exchange</title>
  <style>
    :root{
      --bg:#050814;
      --bg2:#080f24;
      --panel:#101a33;
      --panel2:#151f3d;
      --line:rgba(255,255,255,.14);
      --text:#f7fbff;
      --muted:#aab8d4;
      --cyan:#59f1ff;
      --cyan2:#00b8ff;
      --pink:#ff3ea5;
      --gold:#ffd166;
      --green:#58f28f;
      --red:#ff5f73;
      --orange:#ff9f1c;
      --purple:#a66cff;
      --shadow:0 16px 40px rgba(0,0,0,.35);
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      color:var(--text);
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:
        radial-gradient(circle at 15% 0%, rgba(255,62,165,.20), transparent 30%),
        radial-gradient(circle at 85% 12%, rgba(89,241,255,.22), transparent 34%),
        linear-gradient(180deg,var(--bg) 0%,#071022 52%,#050814 100%);
      min-height:100vh;
    }

    body:before{
      content:"";
      position:fixed; inset:0;
      pointer-events:none;
      background:
        linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px),
        linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px);
      background-size:44px 44px;
      mask-image:linear-gradient(to bottom, rgba(0,0,0,.8), transparent 85%);
    }

    .topbar{
      position:sticky; top:0; z-index:20;
      backdrop-filter: blur(14px);
      background:rgba(5,8,20,.78);
      border-bottom:1px solid var(--line);
    }
    header{
      max-width:1180px;
      margin:0 auto;
      padding:18px 18px 12px;
    }
    .brandrow{display:flex;align-items:center;justify-content:space-between;gap:16px}
    .brandmark{display:flex;align-items:center;gap:12px}
    .logo{
      width:46px;height:46px;border-radius:14px;
      background:conic-gradient(from 180deg,var(--cyan),var(--pink),var(--gold),var(--cyan));
      box-shadow:0 0 24px rgba(89,241,255,.35);
      display:grid;place-items:center;color:#06101d;font-weight:1000;
      transform:skew(-7deg);
    }
    h1{margin:0;font-size:34px;letter-spacing:.2px;line-height:1}
    .tagline{color:var(--muted);font-size:14px;margin-top:5px}
    .menuToggle{
      display:none;
      border:1px solid var(--line);
      color:var(--text);
      background:rgba(255,255,255,.06);
      border-radius:12px;
      padding:10px 12px;
      font-weight:900;
      cursor:pointer;
    }
    nav{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}
    button.tab{
      border:1px solid rgba(89,241,255,.28);
      background:rgba(8,17,38,.9);
      color:var(--text);
      border-radius:999px;
      padding:10px 14px;
      font-weight:900;
      cursor:pointer;
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.02);
      transition:.15s transform,.15s background,.15s border-color;
    }
    button.tab:hover{transform:translateY(-1px);border-color:rgba(89,241,255,.7)}
    button.tab.active{
      background:linear-gradient(135deg,var(--cyan),#7affd7);
      color:#05101f;
      border-color:transparent;
      box-shadow:0 0 20px rgba(89,241,255,.25);
    }

    main{max-width:1180px;margin:0 auto;padding:20px 18px 48px}
    .page{display:none}.page.active{display:block}

    .hero{
      border:1px solid var(--line);
      background:
        linear-gradient(135deg,rgba(89,241,255,.14),rgba(255,62,165,.08)),
        rgba(16,26,51,.8);
      border-radius:22px;
      padding:20px;
      box-shadow:var(--shadow);
      overflow:hidden;
      position:relative;
    }
    .hero:after{
      content:"MARKET OPEN";
      position:absolute;right:-28px;top:20px;
      font-size:52px;font-weight:1000;letter-spacing:3px;
      color:rgba(255,255,255,.045);
      transform:rotate(8deg);
    }
    .hero h2{font-size:28px;margin:0 0 4px}
    .hero p{margin:0;color:var(--muted)}
    .hero-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
    .cta{
      border:0;border-radius:14px;padding:12px 16px;font-weight:1000;cursor:pointer;
      color:#06101d;background:linear-gradient(135deg,var(--gold),#ffef9d);
    }
    .cta.secondary{background:rgba(255,255,255,.08);color:var(--text);border:1px solid var(--line)}

    .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:14px}
    .grid.two{grid-template-columns:2fr 1fr}
    .card{
      background:linear-gradient(180deg,rgba(21,31,61,.92),rgba(12,21,42,.92));
      border:1px solid var(--line);
      border-radius:18px;
      padding:16px;
      box-shadow:var(--shadow);
    }
    .kicker{font-size:11px;text-transform:uppercase;letter-spacing:1.9px;color:var(--cyan);font-weight:1000}
    .big{font-size:32px;font-weight:1000;margin:7px 0 3px;line-height:1}
    .small{color:var(--muted);font-size:13px}
    .report-title{font-size:22px;font-weight:1000;margin:10px 0 8px}
    .report-body{font-size:15px;line-height:1.55;white-space:pre-wrap;color:#ecf7ff}
    .ticker{
      margin-top:14px;border:1px solid rgba(89,241,255,.25);
      background:rgba(89,241,255,.08);
      border-radius:14px;padding:10px 12px;overflow:hidden;
      color:#d9fbff;font-weight:800;
    }

    .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin:0 0 12px}
    input.search, select.filter{
      background:rgba(7,16,36,.92);
      border:1px solid rgba(89,241,255,.24);
      border-radius:12px;
      color:var(--text);
      padding:11px 12px;
      min-width:170px;
      outline:none;
    }

    table{
      width:100%;border-collapse:separate;border-spacing:0;
      background:rgba(11,21,42,.86);
      border:1px solid var(--line);
      border-radius:16px;overflow:hidden;
      box-shadow:var(--shadow);
    }
    th,td{
      border-bottom:1px solid rgba(255,255,255,.085);
      padding:11px 10px;text-align:left;font-size:13px;vertical-align:middle;
    }
    th{
      background:linear-gradient(180deg,rgba(89,241,255,.14),rgba(255,255,255,.04));
      font-size:11px;text-transform:uppercase;letter-spacing:.7px;color:#f2fbff;
      position:sticky;top:103px;z-index:5;
    }
    tr:hover td{background:rgba(89,241,255,.045)}
    tr:last-child td{border-bottom:none}

    .pos{
      width:30px;height:30px;border-radius:10px;display:grid;place-items:center;
      background:rgba(255,255,255,.08);font-weight:1000;
    }
    .podium1{background:linear-gradient(135deg,var(--gold),#fff2a8);color:#07101f}
    .podium2{background:linear-gradient(135deg,#d9e5f4,#8796a8);color:#07101f}
    .podium3{background:linear-gradient(135deg,#ffb15e,#9b5d1d);color:#07101f}

    .badge{
      display:inline-flex;align-items:center;gap:6px;
      border-radius:999px;padding:5px 9px;font-size:12px;font-weight:1000;
      border:1px solid rgba(255,255,255,.13);white-space:nowrap;
    }
    .tier-bluechip{background:rgba(89,241,255,.16);color:#9ff7ff}
    .tier-contender{background:rgba(88,242,143,.14);color:#98ffbe}
    .tier-midmarket{background:rgba(255,209,102,.14);color:#ffe09a}
    .tier-darkhorse{background:rgba(166,108,255,.17);color:#d8c4ff}
    .tier-wildcard{background:rgba(255,159,28,.16);color:#ffc275}
    .tier-pennystock{background:rgba(255,95,115,.16);color:#ff9daa}
    .status-active,.status-played{background:rgba(88,242,143,.14);color:#96ffbd}
    .status-scheduled{background:rgba(89,241,255,.12);color:#a8f8ff}
    .status-eliminated{background:rgba(255,95,115,.16);color:#ff9daa}
    .captain{background:rgba(255,209,102,.16);color:#ffe09a}

    .portfolio-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:12px}
    .manager-card h3{margin:0 0 4px;font-size:19px}
    .points-burst{font-size:24px;font-weight:1000;color:var(--gold)}
    .nation-list{display:flex;flex-direction:column;gap:8px;margin-top:12px}
    .nation-chip{
      display:flex;justify-content:space-between;gap:8px;align-items:center;
      background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.08);
      border-radius:13px;padding:9px;
    }

    .rules-wrap{display:grid;grid-template-columns:minmax(0,1.2fr) minmax(280px,.8fr);gap:14px}
    .rules-list li{margin:0 0 9px;line-height:1.45}
    .download{
      display:inline-block;text-decoration:none;border-radius:12px;
      background:linear-gradient(135deg,var(--cyan),#9dffe7);color:#06101d;
      padding:11px 14px;font-weight:1000;margin-top:10px;
    }

    .form-modal{
      display:none;position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.72);
      padding:20px;
    }
    .form-box{max-width:760px;margin:30px auto;background:var(--panel);border:1px solid var(--line);border-radius:18px;overflow:hidden}
    .form-head{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-bottom:1px solid var(--line)}
    .form-head button{background:rgba(255,255,255,.08);color:var(--text);border:1px solid var(--line);border-radius:10px;padding:8px 10px;cursor:pointer}
    iframe{width:100%;height:660px;border:0;background:white}
    .debug{display:none;font-size:12px;color:#8fd7ff;margin-top:14px}.show-debug .debug{display:block}.ok{color:var(--green)}.err{color:var(--red)}

    @media(max-width:820px){
      header{padding:14px}
      h1{font-size:25px}
      .menuToggle{display:block}
      nav{display:none}
      nav.open{display:flex;position:fixed;left:12px;right:12px;top:82px;background:rgba(5,8,20,.96);border:1px solid var(--line);border-radius:18px;padding:12px;box-shadow:var(--shadow)}
      button.tab{width:100%;text-align:left}
      .grid,.grid.two,.rules-wrap{grid-template-columns:1fr}
      table{display:block;overflow-x:auto;white-space:nowrap}
      th{position:static}
      .hero:after{display:none}
    }
  </style>
</head>
<body>
<div class="topbar">
<header>
  <div class="brandrow">
    <div class="brandmark">
      <div class="logo">£F</div>
      <div>
        <h1>World Cup Stock Exchange</h1>
        <div class="tagline">48 nations. One market. Several terrible investments.</div>
      </div>
    </div>
    <button class="menuToggle" onclick="document.querySelector('nav').classList.toggle('open')">☰ Menu</button>
  </div>
  <nav>
    <button class="tab active" data-page="home">Trading Floor</button>
    <button class="tab" data-page="table">League Table</button>
    <button class="tab" data-page="fixtures">Fixtures</button>
    <button class="tab" data-page="portfolios">Portfolios</button>
    <button class="tab" data-page="nations">Nation Market</button>
    <button class="tab" data-page="reports">Market Reports</button>
    <button class="tab" data-page="rules">Rules</button>
  </nav>
</header>
</div>

<main>
  <section id="home" class="page active"></section>
  <section id="table" class="page"></section>
  <section id="fixtures" class="page"></section>
  <section id="portfolios" class="page"></section>
  <section id="nations" class="page"></section>
  <section id="reports" class="page"></section>
  <section id="rules" class="page"></section>
</main>

<div class="form-modal" id="signupModal">
  <div class="form-box">
    <div class="form-head">
      <b>Join the Market</b>
      <button onclick="closeSignup()">Close</button>
    </div>
    <div id="signupBody"></div>
  </div>
</div>

<script>
/*
  FORM SETUP:
  Create a Google Form for sign-up, then paste its public /viewform link below.
  Example: const SIGNUP_FORM_URL = "https://forms.gle/kSYBzuvKE2JtLQDeA"; // Google Form sign-up link.
*/
const SIGNUP_FORM_URL = "https://forms.gle/kSYBzuvKE2JtLQDeA"; // Google Form sign-up link.

// Optional debug mode: add ?debug=1 to the website URL to show data checks.
if (new URLSearchParams(window.location.search).get("debug") === "1") {
  document.body.classList.add("show-debug");
}


const SHEET_ID = "1GRDmFQt8SI-IeFVGWwAVUFin99kp7re7jx4vZbkPpxA";
const TABLES = {
  league: "Public_League_Table",
  fixtures: "Public_Fixtures",
  portfolios: "Public_Portfolios",
  nations: "Public_Nations",
  reports: "Public_Market_Reports",
  rules: "Public_Rules"
};
const state = { league:[], fixtures:[], portfolios:[], nations:[], reports:[], rules:[], errors:[] };

function normKey(k){return String(k??"").replace(/\uFEFF/g,"").trim().toLowerCase().replace(/[^a-z0-9]/g,"")}
function val(row,names){for(const name of names){const t=normKey(name);for(const k of Object.keys(row)){if(normKey(k)===t)return row[k]}}return""}
function clean(v){return String(v??"").trim()}
function toNum(v){const n=Number(String(v??"").replace(/[^\d.-]/g,''));return isNaN(n)?0:n}
function esc(s){return String(s??"").replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function slug(s){return clean(s).toLowerCase().replace(/[^a-z0-9]+/g,"")}
function badge(text,type=""){return text?`<span class="badge ${type}">${esc(text)}</span>`:""}
function tierBadge(t){const s=slug(t); let c=""; if(s.includes("blue"))c="tier-bluechip"; else if(s.includes("contender"))c="tier-contender"; else if(s.includes("mid"))c="tier-midmarket"; else if(s.includes("dark"))c="tier-darkhorse"; else if(s.includes("wild"))c="tier-wildcard"; else if(s.includes("penny"))c="tier-pennystock"; return badge(t,c)}
function statusBadge(s){const x=slug(s); let c=x.includes("played")?"status-played":x.includes("scheduled")?"status-scheduled":x.includes("eliminated")?"status-eliminated":x.includes("active")?"status-active":""; return badge(s,c)}

function getRowsFromGvizResponse(json){
  const cols=json.table.cols.map((c,i)=>clean(c.label||c.id||`Col${i+1}`));
  return json.table.rows.map(r=>{const o={};cols.forEach((c,i)=>{const cell=r.c[i];o[c]=cell?(cell.f??cell.v??""):""});return o})
    .filter(row=>Object.values(row).some(v=>clean(v)!==""));
}
function loadSheet(key,sheetName){
  return new Promise(resolve=>{
    const cb="gviz_cb_"+key+"_"+Math.random().toString(36).slice(2);
    const timeout=setTimeout(()=>{state.errors.push(`${sheetName}: load timed out`);cleanup();resolve([])},12000);
    function cleanup(){clearTimeout(timeout);try{delete window[cb]}catch(e){window[cb]=undefined} const s=document.getElementById(cb); if(s)s.remove()}
    window[cb]=json=>{try{if(json.status==="error")throw new Error(json.errors?.[0]?.detailed_message||"Google returned an error");const rows=getRowsFromGvizResponse(json);cleanup();resolve(rows)}catch(e){state.errors.push(`${sheetName}: ${e.message}`);cleanup();resolve([])}};
    const script=document.createElement("script");script.id=cb;script.onerror=()=>{state.errors.push(`${sheetName}: script load failed`);cleanup();resolve([])};
    script.src=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=responseHandler:${cb}&sheet=${encodeURIComponent(sheetName)}&tq=${encodeURIComponent("select *")}`;
    document.body.appendChild(script);
  });
}

function renderTable(rows, columns){
  if(!rows.length)return `<div class="card">No data loaded yet.</div>`;
  return `<table><thead><tr>${columns.map(c=>`<th>${esc(c.label)}</th>`).join("")}</tr></thead><tbody>`+
    rows.map(r=>`<tr>${columns.map(c=>`<td>${c.render?c.render(r):esc(val(r,c.keys||[c.label]))}</td>`).join("")}</tr>`).join("")+
    `</tbody></table>`;
}
function latestReport(){
  const rows=state.reports.filter(r=>clean(val(r,["Title"])) && clean(val(r,["Show_On_Home","Show On Home","ShowOnHome"])).toLowerCase()!=="no");
  return rows[rows.length-1]||{};
}
function reportBody(r){
  let body=clean(val(r,["Summary","Full_Report","Full Report","Report","Market_Report","Notes"]));
  if(body)return body;
  const skip=new Set(["reportid","date","stage","title","showonhome"]);
  let best="";
  Object.entries(r).forEach(([k,v])=>{const sv=clean(v); if(sv && !skip.has(normKey(k)) && sv.length>best.length) best=sv});
  return best||"No report loaded yet.";
}
function fixtureScore(r){const a=clean(val(r,["A_Goals","A Goals","AGoals"]));const b=clean(val(r,["B_Goals","B Goals","BGoals"]));return (a!==""||b!=="")?`${a||0}-${b||0}`:"v"}
function validLeagueRows(){return state.league.filter(r=>clean(val(r,["Manager_Name","Manager Name","Manager"]))||clean(val(r,["Team_Name","Team Name"])))}
function leagueSorted(){
  return validLeagueRows().sort((a,b)=>toNum(val(b,["Total_Points","Total Points","Points"]))-toNum(val(a,["Total_Points","Total Points","Points"])));
}

function renderHome(){
  const standings=leagueSorted();
  const leader=standings[0]||{};
  const played=state.fixtures.filter(r=>slug(val(r,["Status"]))==="played").length;
  const next=state.fixtures.find(r=>slug(val(r,["Status"]))!=="played")||{};
  const rep=latestReport();
  const repMeta=[val(rep,["Date"]),val(rep,["Stage"]),val(rep,["Report_ID","Report ID"])].filter(Boolean).join(" • ");
  const top3=standings.slice(0,3);
  const ticker = top3.map((r,i)=>`${i+1}. ${val(r,["Team_Name","Team Name"])||val(r,["Manager_Name","Manager Name"])} ${val(r,["Total_Points","Total Points","Points"])||0} pts`).join("  ·  ");

  document.getElementById("home").innerHTML=`
    <div class="hero">
      <h2>The Trading Floor is Open</h2>
      <p>Draft nations, watch the points move, and pretend this is investment strategy rather than football chaos in a suit.</p>
      <div class="hero-actions">
        <a class="cta" href="https://forms.gle/kSYBzuvKE2JtLQDeA" target="_blank" rel="noopener" style="text-decoration:none;display:inline-block;">Join / Register Interest</a>
        <button class="cta secondary" onclick="goPage('table')">View League Table</button>
        <button class="cta secondary" onclick="goPage('fixtures')">Check Fixtures</button>
      </div>
      <div class="ticker">LIVE MARKET: ${esc(ticker || "No investors listed yet. The market awaits fresh victims.")}</div>
    </div>

    <div class="grid">
      <div class="card"><div class="kicker">Market Leader</div><div class="big">${esc(val(leader,["Team_Name","Team Name","Manager_Name","Manager Name"])||"TBC")}</div><div class="small">${esc(val(leader,["Total_Points","Total Points","Points"])||"0")} pts</div></div>
      <div class="card"><div class="kicker">Fixtures Played</div><div class="big">${played}</div><div class="small">of ${state.fixtures.length||104}</div></div>
      <div class="card"><div class="kicker">Next Fixture</div><div class="big" style="font-size:20px">${esc(val(next,["Team_A","Team A"])||"TBC")} <span class="small">v</span> ${esc(val(next,["Team_B","Team B"])||"TBC")}</div><div class="small">${esc([val(next,["Stage"]),val(next,["Group"]),val(next,["Round"])].filter(Boolean).join(" • "))}</div></div>
    </div>

    <div class="grid two">
      <div class="card">
        <div class="kicker">${esc(repMeta||"Latest Market Report")}</div>
        <div class="report-title">${esc(val(rep,["Title"])||"Latest Market Report")}</div>
        <div class="report-body">${esc(reportBody(rep))}</div>
      </div>
      <div class="card">
        <div class="kicker">Top 3</div>
        ${top3.length?top3.map((r,i)=>`<div class="nation-chip"><div><b>${i+1}. ${esc(val(r,["Team_Name","Team Name"])||val(r,["Manager_Name","Manager Name"]))}</b><div class="small">${esc(val(r,["Manager_Name","Manager Name"])||"")}</div></div><div class="points-burst">${esc(val(r,["Total_Points","Total Points","Points"])||0)}</div></div>`).join(""):"<div class='small'>No league data yet.</div>"}
      </div>
    </div>
    <div class="debug"><b>Data check:</b> table ${state.league.length}, fixtures ${state.fixtures.length}, portfolios ${state.portfolios.length}, nations ${state.nations.length}, reports ${state.reports.length}, rules ${state.rules.length}<br>${state.errors.length?`<span class="err">${esc(state.errors.join(" | "))}</span>`:`<span class="ok">All data tables loaded.</span>`}</div>`;
}

function renderLeague(){
  const rows=leagueSorted();
  document.getElementById("table").innerHTML=renderTable(rows,[
    {label:"Pos",render:r=>{const i=rows.indexOf(r)+1;return `<span class="pos ${i===1?'podium1':i===2?'podium2':i===3?'podium3':''}">${i}</span>`}},
    {label:"Manager",keys:["Manager_Name","Manager Name","Manager"]},
    {label:"Team",keys:["Team_Name","Team Name"]},
    {label:"Points",keys:["Total_Points","Total Points","Points"]},
    {label:"Captain",render:r=>clean(val(r,["Captain_Nation","Captain Nation","Captain"]))?badge(val(r,["Captain_Nation","Captain Nation","Captain"]),"captain"):""},
    {label:"Notes",keys:["Notes"]}
  ]);
}

function renderFixtures(){
  const statuses=[...new Set(state.fixtures.map(r=>clean(val(r,["Status"]))).filter(Boolean))].sort();
  const stages=[...new Set(state.fixtures.map(r=>clean(val(r,["Stage"]))).filter(Boolean))].sort();
  const groups=[...new Set(state.fixtures.map(r=>clean(val(r,["Group"]))).filter(Boolean))].sort();
  document.getElementById("fixtures").innerHTML=`
    <div class="toolbar">
      <select class="filter" id="fixtureStatus" onchange="applyFixtureFilters()">
        <option value="Scheduled" selected>Scheduled only</option>
        <option value="Played">Played only</option>
        <option value="All">All fixtures</option>
        ${statuses.filter(s=>!["Scheduled","Played"].includes(s)).map(s=>`<option>${esc(s)}</option>`).join("")}
      </select>
      <select class="filter" id="fixtureStage" onchange="applyFixtureFilters()"><option value="All">All stages</option>${stages.map(s=>`<option>${esc(s)}</option>`).join("")}</select>
      <select class="filter" id="fixtureGroup" onchange="applyFixtureFilters()"><option value="All">All groups</option>${groups.map(s=>`<option>${esc(s)}</option>`).join("")}</select>
      <input class="search" id="fixtureSearch" placeholder="Search fixtures..." oninput="applyFixtureFilters()">
    </div>
    <div id="fixtureTable"></div>`;
  applyFixtureFilters();
}
function applyFixtureFilters(){
  const status=document.getElementById("fixtureStatus")?.value||"Scheduled";
  const stage=document.getElementById("fixtureStage")?.value||"All";
  const group=document.getElementById("fixtureGroup")?.value||"All";
  const q=(document.getElementById("fixtureSearch")?.value||"").toLowerCase();
  let rows=state.fixtures.filter(r=>{
    const rs=clean(val(r,["Status"]))||"Scheduled";
    const okS=status==="All"||rs===status;
    const okSt=stage==="All"||clean(val(r,["Stage"]))===stage;
    const okG=group==="All"||clean(val(r,["Group"]))===group;
    const okQ=!q||Object.values(r).join(" ").toLowerCase().includes(q);
    return okS&&okSt&&okG&&okQ;
  });
  document.getElementById("fixtureTable").innerHTML=renderTable(rows,[
    {label:"Match",keys:["Match_No","Match No","Match_ID"]},
    {label:"Date",keys:["Date","UK_Date","UK Date"]},
    {label:"Stage",keys:["Stage"]},
    {label:"Group/Round",render:r=>esc([val(r,["Group"]),val(r,["Round"])].filter(Boolean).join(" "))},
    {label:"Fixture",render:r=>`${esc(val(r,["Team_A","Team A"]))} <b>${esc(fixtureScore(r))}</b> ${esc(val(r,["Team_B","Team B"]))}`},
    {label:"Status",render:r=>statusBadge(val(r,["Status"])||"Scheduled")},
    {label:"Notes",keys:["Notes"]}
  ]);
}

function renderPortfolios(){
  const rows=state.portfolios.filter(r=>clean(val(r,["Nation"])) || clean(val(r,["Manager_Name","Manager Name","Owner_Name","Owner Name"])));
  const groups={};
  rows.forEach(r=>{
    const key=clean(val(r,["Manager_Name","Manager Name","Owner_Name","Owner Name"]))||"Unassigned";
    if(!groups[key]) groups[key]=[];
    groups[key].push(r);
  });
  document.getElementById("portfolios").innerHTML=`
    <div class="toolbar"><input class="search" id="portfolioSearch" placeholder="Search portfolios..." oninput="renderPortfolioCards(this.value)"></div>
    <div id="portfolioCards"></div>`;
  renderPortfolioCards("");
}
function renderPortfolioCards(filter=""){
  const f=filter.toLowerCase();
  const rows=state.portfolios.filter(r=>{
    const hasNation=clean(val(r,["Nation"]))!=="";
    const hasManager=clean(val(r,["Manager_Name","Manager Name","Owner_Name","Owner Name"]))!=="";
    return (hasNation||hasManager) && (!f||Object.values(r).join(" ").toLowerCase().includes(f));
  });
  const groups={};
  rows.forEach(r=>{
    const manager=clean(val(r,["Manager_Name","Manager Name","Owner_Name","Owner Name"]))||"Unassigned";
    if(!groups[manager]) groups[manager]=[];
    groups[manager].push(r);
  });
  document.getElementById("portfolioCards").innerHTML=`<div class="portfolio-grid">`+Object.entries(groups).map(([manager,items])=>{
    const first=items[0]||{};
    const total=items.reduce((a,r)=>a+toNum(val(r,["Total_Points","Total Points","Points"])),0);
    return `<div class="card manager-card">
      <h3>${esc(manager)}</h3>
      <div class="small">${esc(val(first,["Team_Name","Team Name"])||"")}</div>
      <div class="points-burst">${total} pts</div>
      <div class="nation-list">
        ${items.filter(r=>clean(val(r,["Nation"]))).map(r=>`<div class="nation-chip"><div><b>${esc(val(r,["Nation"]))}</b><div>${tierBadge(val(r,["Draft_Tier","Draft Tier","Tier","Slot"]))} ${slug(val(r,["Captain","Captain?"]))==="yes"?badge("Captain","captain"):""}</div></div><b>${esc(val(r,["Total_Points","Total Points","Points"])||0)}</b></div>`).join("") || "<div class='small'>No nations drafted yet.</div>"}
      </div>
    </div>`;
  }).join("")+`</div>`;
}

function renderNations(){
  const tiers=[...new Set(state.nations.map(r=>clean(val(r,["Draft_Tier","Draft Tier","Tier"]))).filter(Boolean))].sort();
  const groups=[...new Set(state.nations.map(r=>clean(val(r,["Group"]))).filter(Boolean))].sort();
  const owners=[...new Set(state.nations.map(r=>clean(val(r,["Owner_Name","Owner Name","Owner","Manager_Name","Manager Name"]))).filter(Boolean))].sort();
  const statuses=[...new Set(state.nations.map(r=>clean(val(r,["Status"]))).filter(Boolean))].sort();
  document.getElementById("nations").innerHTML=`
    <div class="toolbar">
      <input class="search" id="nationSearch" placeholder="Search nations..." oninput="applyNationFilters()">
      <select class="filter" id="nationTier" onchange="applyNationFilters()"><option value="All">All tiers</option>${tiers.map(s=>`<option>${esc(s)}</option>`).join("")}</select>
      <select class="filter" id="nationGroup" onchange="applyNationFilters()"><option value="All">All groups</option>${groups.map(s=>`<option>${esc(s)}</option>`).join("")}</select>
      <select class="filter" id="nationOwner" onchange="applyNationFilters()"><option value="All">All owners</option><option value="Unowned">Unowned only</option>${owners.map(s=>`<option>${esc(s)}</option>`).join("")}</select>
      <select class="filter" id="nationStatus" onchange="applyNationFilters()"><option value="All">All statuses</option>${statuses.map(s=>`<option>${esc(s)}</option>`).join("")}</select>
    </div>
    <div id="nationTable"></div>`;
  applyNationFilters();
}
function applyNationFilters(){
  const q=(document.getElementById("nationSearch")?.value||"").toLowerCase();
  const tier=document.getElementById("nationTier")?.value||"All";
  const group=document.getElementById("nationGroup")?.value||"All";
  const owner=document.getElementById("nationOwner")?.value||"All";
  const status=document.getElementById("nationStatus")?.value||"All";
  const rows=state.nations.filter(r=>{
    const rt=clean(val(r,["Draft_Tier","Draft Tier","Tier"]));
    const rg=clean(val(r,["Group"]));
    const ro=clean(val(r,["Owner_Name","Owner Name","Owner","Manager_Name","Manager Name"]));
    const rs=clean(val(r,["Status"]));
    return (!q||Object.values(r).join(" ").toLowerCase().includes(q)) &&
      (tier==="All"||rt===tier) && (group==="All"||rg===group) &&
      (owner==="All"||(owner==="Unowned"?!ro:ro===owner)) && (status==="All"||rs===status);
  });
  document.getElementById("nationTable").innerHTML=renderTable(rows,[
    {label:"Nation",keys:["Nation"]},
    {label:"Group",keys:["Group"]},
    {label:"Tier",render:r=>tierBadge(val(r,["Draft_Tier","Draft Tier","Tier"]))},
    {label:"Owner",keys:["Owner_Name","Owner Name","Owner","Manager_Name","Manager Name"]},
    {label:"Captain",render:r=>slug(val(r,["Captain","Captain?"]))==="yes"?badge("Captain","captain"):esc(val(r,["Captain","Captain?"]))},
    {label:"Points",keys:["Total_Points","Total Points","Points"]},
    {label:"Status",render:r=>statusBadge(val(r,["Status"]))},
    {label:"Notes",keys:["Notes"]}
  ]);
}

function renderReports(){
  const rows=[...state.reports].reverse();
  document.getElementById("reports").innerHTML=rows.length?rows.map(r=>`<div class="card" style="margin-bottom:12px"><div class="kicker">${esc([val(r,["Date"]),val(r,["Stage"]),val(r,["Report_ID","Report ID"])].filter(Boolean).join(" • "))}</div><div class="report-title">${esc(val(r,["Title"])||"Market Report")}</div><div class="report-body">${esc(reportBody(r))}</div></div>`).join(""):`<div class="card">No market reports loaded yet.</div>`;
}

function renderRules(){
  document.getElementById("rules").innerHTML=`
  <div class="rules-wrap">
    <div class="card">
      <div class="kicker">Quick Rules</div>
      <h2 style="margin:8px 0 10px">How to Play</h2>
      <ul class="rules-list">
        <li>Each manager drafts a portfolio of World Cup nations.</li>
        <li>Nations score from real World Cup results: wins, draws, clean sheets, 3+ goals, big wins, upsets and progression.</li>
        <li>Nations lose points for red cards, own goals, missed penalties, heavy defeats, conceding 4+, and other disasters.</li>
        <li>Captain nations boost scoring based on the agreed rules.</li>
        <li>The league table is ranked by total points. Highest total wins the market.</li>
        <li>The Commissioner settles disputes. Bribes are not accepted unless very funny.</li>
      </ul>
      <a class="download" href="#" onclick="downloadRules();return false;">Download Full Rules</a>
    </div>
    <div>${renderTable(state.rules,[
      {label:"Category",keys:["Category","Section"]},
      {label:"Rule",keys:["Rule","Event"]},
      {label:"Points",keys:["Points"]},
      {label:"Notes",keys:["Notes"]}
    ])}</div>
  </div>`;
}

function downloadRules(){
  window.open("world_cup_stock_exchange_full_rules.pdf", "_blank");
}

function openSignup(){
  const body=document.getElementById("signupBody");
  if(SIGNUP_FORM_URL){
    const url=SIGNUP_FORM_URL.includes("embedded=true")?SIGNUP_FORM_URL:SIGNUP_FORM_URL+(SIGNUP_FORM_URL.includes("?")?"&":"?")+"embedded=true";
    body.innerHTML=`<iframe src="${esc(url)}">Loading…</iframe>`;
  }else{
    body.innerHTML=`<div style="padding:18px"><h2>Sign-up form not connected yet</h2><p class="small">Create a Google Form, send me the public link, and I’ll wire it into this button so it opens inside the site.</p><p>Suggested form fields:</p><ul><li>Name</li><li>Team / investment company name</li><li>WhatsApp name</li><li>Do you understand your picks may ruin your week?</li></ul></div>`;
  }
  document.getElementById("signupModal").style.display="block";
}
function closeSignup(){document.getElementById("signupModal").style.display="none"}

function goPage(page){
  document.querySelector(`button[data-page="${page}"]`)?.click();
}

document.querySelectorAll("button.tab").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll("button.tab").forEach(b=>b.classList.remove("active"));
    document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById(btn.dataset.page).classList.add("active");
    document.querySelector("nav").classList.remove("open");
  });
});

function renderAll(){renderHome();renderLeague();renderFixtures();renderPortfolios();renderNations();renderReports();renderRules();}

(async function init(){
  const entries=Object.entries(TABLES);
  const results=await Promise.all(entries.map(([key,name])=>loadSheet(key,name)));
  entries.forEach(([key],i)=>state[key]=results[i]);
  renderAll();
})();
</script>
</body>
