<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>World Cup Stock Exchange</title>
  <style>
    :root{
      --bg:#06111f; --panel:#0d1b2e; --panel2:#102238; --line:#24415f;
      --text:#f3f7ff; --muted:#a9bed8; --accent:#55dff4; --good:#65f5a4; --bad:#ff7474;
      --warn:#ffd166;
    }
    *{box-sizing:border-box}
    body{margin:0;background:linear-gradient(180deg,#050e1b,#071424 45%,#06111f);color:var(--text);font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;}
    .wrap{max-width:1180px;margin:0 auto;padding:20px 18px 40px;}
    header{border-bottom:1px solid var(--line);position:sticky;top:0;background:rgba(6,17,31,.96);backdrop-filter:blur(8px);z-index:5}
    h1{font-size:34px;margin:0 0 4px;letter-spacing:.2px}.tag{color:var(--muted);font-size:14px;margin-bottom:18px}
    nav{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}.tab{border:1px solid var(--line);background:#07182b;color:var(--text);border-radius:999px;padding:9px 15px;font-weight:700;cursor:pointer}.tab.active{background:var(--accent);color:#04111d;border-color:var(--accent)}
    .page{display:none;padding-top:18px}.page.active{display:block}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.card{background:linear-gradient(180deg,var(--panel),#0a1728);border:1px solid var(--line);border-radius:14px;padding:16px;box-shadow:0 8px 22px rgba(0,0,0,.22)}
    .label{font-size:11px;text-transform:uppercase;letter-spacing:2px;color:#b7d7ff}.big{font-size:30px;font-weight:900;margin:6px 0 2px}.small{color:var(--muted);font-size:13px}.report-card{margin-top:12px}.report-meta{font-size:11px;text-transform:uppercase;letter-spacing:1.8px;color:#b7d7ff;margin-bottom:9px}.report-title{font-size:22px;font-weight:900;margin-bottom:10px}.report-body{font-size:15px;line-height:1.55;white-space:pre-wrap;color:#f5f8ff}.toolbar{margin-bottom:10px;display:flex;gap:10px;flex-wrap:wrap}.search{background:#07182b;border:1px solid var(--line);color:var(--text);border-radius:9px;padding:10px 12px;min-width:220px}.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:12px;background:rgba(13,27,46,.75)}table{width:100%;border-collapse:collapse;font-size:14px}th,td{padding:10px;border-bottom:1px solid rgba(36,65,95,.75);text-align:left;vertical-align:top}th{background:#102238;color:#eaf3ff;font-size:12px;text-transform:uppercase;letter-spacing:.6px}tr:hover td{background:rgba(85,223,244,.05)}.pill{display:inline-block;border:1px solid var(--line);border-radius:999px;padding:3px 8px;font-size:12px;color:#dcecff;background:#07182b}.status-played{color:var(--good);font-weight:800}.status-scheduled{color:var(--muted)}.error{color:var(--bad)}.ok{color:var(--good)}.data-check{font-size:12px;margin-top:14px;color:var(--muted)}.rules-list{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.rule{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px}.empty{color:var(--muted);font-style:italic}@media(max-width:760px){h1{font-size:26px}.grid,.rules-list{grid-template-columns:1fr}.wrap{padding:16px 12px}.big{font-size:24px}table{font-size:12px}th,td{padding:8px}}
  </style>
</head>
<body>
<header><div class="wrap" style="padding-bottom:10px"><h1>World Cup Stock Exchange</h1><div class="tag">48 nations. One market. Several terrible investments.</div><nav id="tabs"></nav></div></header>
<main class="wrap">
  <section id="trading" class="page active"></section>
  <section id="league" class="page"></section>
  <section id="fixtures" class="page"></section>
  <section id="portfolios" class="page"></section>
  <section id="nations" class="page"></section>
  <section id="reports" class="page"></section>
  <section id="rules" class="page"></section>
  <div id="debug" class="data-check"></div>
</main>
<script>
const SHEET_ID = '1GRDmFQt8SI-IeFVGWwAVUFin99kp7re7jx4vZbkPpxA';
const SHEETS = {
  league:'Public_League_Table', fixtures:'Public_Fixtures', portfolios:'Public_Portfolios',
  nations:'Public_Nations', reports:'Public_Market_Reports', rules:'Public_Rules'
};
const PAGES = [
  ['trading','Trading Floor'], ['league','League Table'], ['fixtures','Fixtures'], ['portfolios','Portfolios'],
  ['nations','Nation Market'], ['reports','Market Reports'], ['rules','Rules']
];
const state = {league:[],fixtures:[],portfolios:[],nations:[],reports:[],rules:[],issues:[]};
function norm(s){return String(s||'').toLowerCase().replace(/[^a-z0-9]/g,'')}
function get(row, names, fallback=''){
  for(const n of names){const k=Object.keys(row).find(x=>norm(x)===norm(n)); if(k && row[k]!==undefined && row[k]!==null && String(row[k]).trim()!=='') return row[k];}
  return fallback;
}
function num(v){const n=parseFloat(String(v||'').replace(/[^0-9.-]/g,''));return isNaN(n)?0:n}
function loadSheet(key, sheetName){
  return new Promise((resolve)=>{
    const cb='wcse_cb_'+key+'_'+Date.now();
    window[cb]=function(resp){
      try{
        if(resp && resp.status==='error'){throw new Error(resp.errors?.map(e=>e.detailed_message||e.message).join(' | ')||'Google returned error')}
        const cols=(resp.table.cols||[]).map((c,i)=>c.label||c.id||('Col'+(i+1)));
        const rows=(resp.table.rows||[]).map(r=>{const o={}; cols.forEach((c,i)=>{const cell=r.c[i]; o[c]=cell ? (cell.f ?? cell.v ?? '') : ''}); return o;})
          .filter(o=>Object.values(o).some(v=>String(v).trim()!==''));
        state[key]=rows; resolve();
      }catch(e){state.issues.push(`${sheetName}: ${e.message}`); state[key]=[]; resolve();}
      finally{delete window[cb]; script.remove();}
    };
    const script=document.createElement('script');
    script.onerror=()=>{state.issues.push(`${sheetName}: script load failed. Check sheet sharing/publish settings.`); state[key]=[]; delete window[cb]; script.remove(); resolve();};
    const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json;responseHandler:${cb}&sheet=${encodeURIComponent(sheetName)}&tq=${encodeURIComponent('select *')}`;
    script.src=url; document.body.appendChild(script);
  });
}
function makeTabs(){
  const nav=document.getElementById('tabs');
  nav.innerHTML=PAGES.map(([id,label],i)=>`<button class="tab ${i===0?'active':''}" data-page="${id}">${label}</button>`).join('');
  nav.addEventListener('click',e=>{if(!e.target.matches('.tab'))return;document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));e.target.classList.add('active');document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById(e.target.dataset.page).classList.add('active')});
}
function table(rows, cols){
  if(!rows.length)return '<div class="card empty">No data loaded yet.</div>';
  return `<div class="table-wrap"><table><thead><tr>${cols.map(c=>`<th>${c.label}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr>${cols.map(c=>`<td>${c.render?c.render(r):get(r,c.names)}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`;
}
function latestReport(){
  const rows=state.reports.filter(r=>String(get(r,['Show_On_Home'],'Yes')).toLowerCase()!=='no');
  if(!rows.length)return null;
  return rows[rows.length-1];
}
function renderTrading(){
  const league=state.league.slice().filter(r=>get(r,['Manager_Name','Manager','Team_Name']));
  const leader=league.slice().sort((a,b)=>num(get(b,['Total_Points','Points']))-num(get(a,['Total_Points','Points'])))[0] || {};
  const played=state.fixtures.filter(r=>String(get(r,['Status'])).toLowerCase()==='played').length;
  const next=state.fixtures.find(r=>String(get(r,['Status'])).toLowerCase()!=='played') || {};
  const rep=latestReport();
  const title=rep?get(rep,['Title'],'Latest Market Report'):'No report loaded yet';
  const body=rep?get(rep,['Summary','Full_Report','Report','Notes'],'No report text entered yet.'):'No report loaded yet.';
  const meta=rep?[get(rep,['Date']), get(rep,['Stage']), get(rep,['Report_ID'])].filter(Boolean).join(' • '):'';
  document.getElementById('trading').innerHTML=`
    <div class="grid">
      <div class="card"><div class="label">Market Leader</div><div class="big">${get(leader,['Team_Name','Manager_Name','Manager'],'TBC')}</div><div class="small">${get(leader,['Total_Points','Points'],'0')} pts</div></div>
      <div class="card"><div class="label">Fixtures Played</div><div class="big">${played}</div><div class="small">of ${state.fixtures.length||104}</div></div>
      <div class="card"><div class="label">Next Fixture</div><div class="big" style="font-size:18px">${get(next,['Team_A','TeamA'],'TBC')} v ${get(next,['Team_B','TeamB'],'TBC')}</div><div class="small">${[get(next,['Date']),get(next,['Stage']),get(next,['Group','Round'])].filter(Boolean).join(' • ')}</div></div>
    </div>
    <div class="card report-card"><div class="report-meta">${meta||'Latest Market Report'}</div><div class="report-title">${title}</div><div class="report-body">${body}</div></div>`;
}
function renderLeague(){
  document.getElementById('league').innerHTML=`<div class="toolbar"><input class="search" data-filter="league" placeholder="Search table..."></div>`+table(state.league,[
    {label:'Pos',names:['Position','Rank']},{label:'Manager',names:['Manager_Name','Manager']},{label:'Team',names:['Team_Name','Team']},{label:'Points',names:['Total_Points','Points']},{label:'Captain',names:['Captain_Nation','Captain']},{label:'Notes',names:['Notes']}
  ]);
}
function renderFixtures(){
  document.getElementById('fixtures').innerHTML=`<div class="toolbar"><input class="search" data-filter="fixtures" placeholder="Search fixtures..."></div>`+table(state.fixtures,[
    {label:'Match',names:['Match_No','Match_ID']},{label:'Date',names:['Date']},{label:'Stage',names:['Stage']},{label:'Group/Round',names:['Group','Round']},
    {label:'Fixture',names:[],render:r=>`${get(r,['Team_A','TeamA'])} <b>${get(r,['A_Goals'],'')}</b> - <b>${get(r,['B_Goals'],'')}</b> ${get(r,['Team_B','TeamB'])}`},
    {label:'Status',names:['Status'],render:r=>{const s=get(r,['Status']);return `<span class="${String(s).toLowerCase()==='played'?'status-played':'status-scheduled'}">${s}</span>`}},
    {label:'Notes',names:['Notes']}
  ]);
}
function renderPortfolios(){
  document.getElementById('portfolios').innerHTML=`<div class="toolbar"><input class="search" data-filter="portfolios" placeholder="Search portfolios..."></div>`+table(state.portfolios,[
    {label:'Manager',names:['Manager_Name','Owner_Name','Manager']},{label:'Team',names:['Team_Name','Team']},{label:'Nation',names:['Nation']},{label:'Slot',names:['Draft_Slot','Portfolio_Slot']},{label:'Captain',names:['Captain','Captain?']},{label:'Points',names:['Total_Points','Points']},{label:'Status',names:['Status']}
  ]);
}
function renderNations(){
  document.getElementById('nations').innerHTML=`<div class="toolbar"><input class="search" data-filter="nations" placeholder="Search nations..."></div>`+table(state.nations,[
    {label:'Nation',names:['Nation']},{label:'Group',names:['Group']},{label:'Tier',names:['Draft_Tier','Tier']},{label:'Owner',names:['Owner_Name','Owner_Manager_Name','Owner','Drafted_By']},{label:'Captain',names:['Captain','Captain?']},{label:'Points',names:['Total_Points','Points']},{label:'Status',names:['Status']},{label:'Notes',names:['Notes']}
  ]);
}
function renderReports(){
  const rows=state.reports.slice().reverse();
  document.getElementById('reports').innerHTML=rows.length?rows.map(r=>`<div class="card report-card"><div class="report-meta">${[get(r,['Date']),get(r,['Stage']),get(r,['Report_ID'])].filter(Boolean).join(' • ')}</div><div class="report-title">${get(r,['Title'],'Market Report')}</div><div class="report-body">${get(r,['Full_Report','Summary','Report','Notes'],'No report text entered yet.')}</div></div>`).join(''):'<div class="card empty">No market reports loaded yet.</div>';
}
function renderRules(){
  document.getElementById('rules').innerHTML=table(state.rules,[{label:'Category',names:['Category','Rule_Type']},{label:'Rule',names:['Rule','Event']},{label:'Points',names:['Points']},{label:'Notes',names:['Notes']}]);
}
function addSearch(){
  document.querySelectorAll('.search').forEach(input=>input.addEventListener('input',e=>{
    const page=e.target.closest('.page'); const q=e.target.value.toLowerCase();
    page.querySelectorAll('tbody tr').forEach(tr=>{tr.style.display=tr.textContent.toLowerCase().includes(q)?'':'none'});
  }));
}
function renderDebug(){
  document.getElementById('debug').innerHTML=`<b>Data check:</b> Loaded rows — table: ${state.league.length}, fixtures: ${state.fixtures.length}, portfolios: ${state.portfolios.length}, nations: ${state.nations.length}, reports: ${state.reports.length}, rules: ${state.rules.length}<br>${state.issues.length?'<span class="error">Load issues: '+state.issues.join(' | ')+'</span>':'<span class="ok">All data tables loaded.</span>'}`;
}
async function init(){
  makeTabs();
  await Promise.all(Object.entries(SHEETS).map(([k,s])=>loadSheet(k,s)));
  renderTrading(); renderLeague(); renderFixtures(); renderPortfolios(); renderNations(); renderReports(); renderRules(); renderDebug(); addSearch();
}
init();
</script>
</body>
</html>
