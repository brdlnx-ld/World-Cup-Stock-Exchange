/* Patch: proper moving market ticker + scrollable mobile modals */
.headline-ticker{position:relative;overflow:hidden;padding:4px 0;border-radius:18px;mask-image:linear-gradient(90deg,transparent 0,#000 5%,#000 95%,transparent 100%)}
.headline-track{display:flex;gap:10px;width:max-content;max-width:none;animation:wcsxTickerScroll 125s linear infinite;will-change:transform;padding:2px 0;white-space:nowrap}
.headline-ticker:hover .headline-track{animation-play-state:paused}
@keyframes wcsxTickerScroll{from{transform:translateX(0)}to{transform:translateX(-33.333%)}}
.headline-pill{box-shadow:0 8px 20px rgba(0,0,0,.18);flex:0 0 auto;max-width:none}
.ticker-card{padding:12px 14px}.ticker-card .card-header{margin-bottom:6px}.ticker-card .section-title{font-size:24px}.ticker-card .kicker{color:var(--gold)}
.modal{align-items:flex-start;justify-content:center;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:18px}.modal.open{display:flex}.modal-box{max-height:calc(100vh - 36px);overflow-y:auto;overscroll-behavior:contain}.modal-close{float:none;position:sticky;top:0;z-index:3;margin-left:auto;display:flex}

<body>
<div class="topbar"><header><div class="brandrow"><div class="brandmark"><div class="logo">£F</div><div><h1>World Cup Stock Exchange</h1></div></div><div class="right-tools"><button id="viewToggle" class="pillbtn" onclick="toggleViewMode()">Mobile view</button><button class="pillbtn" onclick="refreshData()">Refresh</button></div></div><nav id="nav"><button class="navbtn active" data-page="home">Trading Floor</button><button class="navbtn" data-page="table">League Table</button><button class="navbtn" data-page="fixtures">Fixtures</button><button class="navbtn" data-page="portfolios">Portfolios</button><button class="navbtn" data-page="admin">Admin</button><button class="navbtn" data-page="rules">Rules</button></nav></header></div>

  <div class="view-picker-box">

<main><section id="home" class="page active"></section><section id="table" class="page"></section><section id="fixtures" class="page"></section><section id="portfolios" class="page"></section><section id="admin" class="page"></section><section id="rules" class="page"></section></main>


<script>
const SHEET_ID="1GRDmFQt8SI-IeFVGWwAVUFin99kp7re7jx4vZbkPpxA";
const TABLES={league:"Public_League_Table",previousLeague:"Previous_League_Table",fixtures:"Public_Fixtures",portfolios:"Public_Portfolios",rules:"Public_Rules",ticker:"Public_Ticker"};
// Paste your deployed Apps Script Web App URL between the quotes below.
// Do NOT paste the football-data.org API key here — GitHub pages are public.
// The key belongs in Apps Script/script properties, and this page calls that proxy.
const FOOTBALL_DATA_PROXY_URL="https://script.google.com/macros/s/AKfycbwF_82Hl4yBdVVSiHy58tGhvTqUx9tQ4JBSMwt53iHUjNyycmjRhQU1PMzq9dHzExL6/exec";
// Keep the football-data.org API key in Apps Script, not in this public GitHub file.
// Fixture windows run 08:00 → 08:00 so late games stay in the same WCSX market day.
const GAME_DAY_START_HOUR=8;
const GAME_DAY_START_LABEL="08:00";
const state={league:[],previousLeague:[],fixtures:[],portfolios:[],rules:[],ticker:[],apiMatches:[],errors:[],lastRefresh:null,apiSource:"Sheet fallback",fixtureDayOffset:0,tableMoves:{},commentaryItems:[]};
const SHARE_ADMIN_PIN="1966";
const SHARE_ADMIN_KEY="wcsx_share_admin_unlocked";

function clean(v){return String(v??"").trim()}
function esc(s){return String(s??"").replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function jsArg(s){return JSON.stringify(clean(s)).replace(/"/g,"&quot;")}
function toNum(v){const n=Number(String(v??"").replace(/[^\d.-]/g,""));return isNaN(n)?0:n}
function normKey(k){return clean(k).replace(/\uFEFF/g,"").toLowerCase().replace(/[^a-z0-9]/g,"")}
function val(row,names){for(const name of names){const t=normKey(name);for(const k of Object.keys(row)){if(normKey(k)===t)return row[k]}}return""}
function slug(s){return clean(s).toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[’']/g,"").replace(/[^a-z0-9]+/g,"")}
function badge(t,c=""){return t?`<span class="badge ${c}">${esc(t)}</span>`:""}
function isShareAdminUnlocked(){try{return sessionStorage.getItem(SHARE_ADMIN_KEY)==="yes"}catch(e){return false}}
function unlockShareAdmin(){const pin=prompt("Enter WCSX admin PIN");if(pin===null)return false;if(String(pin).trim()===SHARE_ADMIN_PIN){try{sessionStorage.setItem(SHARE_ADMIN_KEY,"yes")}catch(e){}toast("Admin share cards unlocked");renderAll();return true}toast("Wrong PIN");return false}
function lockShareAdmin(){try{sessionStorage.removeItem(SHARE_ADMIN_KEY)}catch(e){}toast("Admin share cards locked");renderAll()}
function adminShareCard(type){if(!isShareAdminUnlocked()&&!unlockShareAdmin())return;captureShareCard(type)}
function shareAdminStatus(){return isShareAdminUnlocked()?`<span class="badge admin-unlocked">Admin unlocked</span><button class="cta" onclick="lockShareAdmin()">Lock</button>`:`<button class="cta" onclick="unlockShareAdmin()">🔒 Admin</button>`}
function statusClass(s){s=slug(s);return s.includes("inplay")||s.includes("live")||s.includes("paused")?"red":s.includes("play")||s.includes("finish")?"green":s.includes("timed")||s.includes("schedule")?"blue":"purple"}
function statusBadge(s){return badge(s||"Scheduled",statusClass(s))}
function logoUrl(row){return clean(val(row,["Logo_URL","Logo URL","Logo","Team_Logo","Team Logo"]))}
function logoImg(row){const u=logoUrl(row);return u?`<img class="team-logo" src="${esc(u)}" alt="" loading="lazy" crossorigin="anonymous" onerror="this.style.display='none'">`:""}
function teamName(row){return clean(val(row,["Team_Name","Team Name","Investment_Team","Investment Team","Portfolio","Portfolio_Name","Portfolio Name"]))||clean(val(row,["Manager_Name","Manager Name","Manager"]))||"TBC"}
function managerName(row){return clean(val(row,["Manager_Name","Manager Name","Manager","Owner_Name","Owner Name","Owner"]))}
function totalPoints(row){return toNum(val(row,["Total_Points","Total Points","Points","Pts","Score"]))}
function wins(row){return toNum(val(row,["W","Wins","Win"]))}
function losses(row){return toNum(val(row,["L","Losses","Loss"]))}
function draws(row){return toNum(val(row,["D","Draws","Draw"]))}
function positivePts(row){return toNum(val(row,["Positive_PTS","Positive PTS","Positive Points","Positive","Plus_PTS","Plus Points","For","PF","Points_For","Points For"]))}
function negativePts(row){return toNum(val(row,["Negative_PTS","Negative PTS","Negative Points","Negative","Minus_PTS","Minus Points","Against","PA","Points_Against","Points Against"]))}
function nationName(row){return clean(val(row,["Nation","Country","Team","Nation_Name","Nation Name"]))}
function nationCode(row){return clean(val(row,["Nation_ID","Nation ID","Code","Nation_Code","Nation Code"]))}
function teamKey(row){return slug(teamName(row)||managerName(row)||logoUrl(row))}
function isFilledPortfolio(row){const t=teamName(row);if(!t||t==="TBC")return false;if(slug(t).includes("tbc")||slug(t).includes("placeholder"))return false;return true}
function leagueRows(){return [...state.league].filter(isFilledPortfolio).sort((a,b)=>totalPoints(b)-totalPoints(a)||teamName(a).localeCompare(teamName(b)))}
function teamDisplay(row){const team=teamName(row),mgr=managerName(row);return `<div class="team-cell">${logoImg(row)}<div class="team-name-stack"><b>${esc(team)}</b>${mgr&&mgr!==team?`<span class="small">${esc(mgr)}</span>`:""}</div></div>`}

function parsePositionMovement(row){const raw=clean(val(row,["Movement","Position_Movement","Position Movement","Rank_Movement","Rank Movement"]));if(!raw)return null;const n=toNum(raw);const lower=raw.toLowerCase();if(raw.includes("▼")||lower.includes("down")||raw.trim().startsWith("-"))return -Math.abs(n);if(raw.includes("▲")||lower.includes("up")||raw.trim().startsWith("+"))return Math.abs(n);return n}
function computeTableMoves(rows){let prev={};try{prev=JSON.parse(localStorage.getItem("WCSX_TABLE_POSITIONS")||"{}")||{}}catch(e){prev={}}
  const current={};const moves={};rows.forEach((r,i)=>{const k=teamKey(r);const pos=i+1;current[k]=pos;const sheetMove=parsePositionMovement(r);if(sheetMove!==null){moves[k]={dir:sheetMove>0?"up":sheetMove<0?"down":"same",delta:Math.abs(sheetMove),prev:previousRank(r,i),current:pos};return}const prevPos=toNum(val(r,["Previous_Position","Previous Position","Prev_Position","Prev Position","Previous_Rank","Previous Rank"]));const old=prevPos||prev[k];if(!old){moves[k]={dir:"same",delta:0,prev:pos,current:pos};return}const delta=old-pos;moves[k]={dir:delta>0?"up":delta<0?"down":"same",delta:Math.abs(delta),prev:old,current:pos}});
  state.tableMoves=moves;localStorage.setItem("WCSX_TABLE_POSITIONS",JSON.stringify(current));
}
function trendHtml(row){const m=state.tableMoves[teamKey(row)]||{dir:"same",delta:0};if(m.dir==="up")return `<span class="trend up" title="Up ${m.delta}">▲</span>`;if(m.dir==="down")return `<span class="trend down" title="Down ${m.delta}">▼</span>`;return `<span class="trend same" title="No change">–</span>`}

function rankFromRow(row){return toNum(val(row,["Rank","Position","Pos","League_Position","League Position"]))}
function previousRank(row,currentIndex=0){const p=toNum(val(row,["Previous_Position","Previous Position","Prev_Position","Prev Position","Previous_Rank","Previous Rank"]));if(p)return p;const prev=previousRowFor(row);return prev?rankFromRow(prev):currentIndex+1}
function previousPointsFromRow(row){const raw=val(row,["Previous_Total_Points","Previous Total Points","Previous_Points","Previous Points","Prev_Points","Prev Points","Last_Points","Last Points"]);return clean(raw)===""?null:toNum(raw)}
function explicitPointsMove(row){const raw=val(row,["Points_Movement","Points Movement","Point_Movement","Point Movement","Movement_Points","Movement Points","Points_Change","Points Change","Change_Points","Change Points"]);return clean(raw)===""?null:toNum(raw)}
function previousLeagueMap(){const map={};state.previousLeague.forEach((r,i)=>{map[teamKey(r)]=r;if(teamName(r))map[slug(teamName(r))]=r;if(managerName(r))map[slug(managerName(r))]=r});return map}
function previousRowFor(row){const map=previousLeagueMap();return map[teamKey(row)]||map[slug(teamName(row))]||map[slug(managerName(row))]||null}
function pointsDelta(row){const explicit=explicitPointsMove(row);if(explicit!==null)return explicit;const prevRow=previousRowFor(row);if(prevRow)return totalPoints(row)-totalPoints(prevRow);const prev=previousPointsFromRow(row);if(prev!==null)return totalPoints(row)-prev;return null}
function formatDelta(n){if(n===null||isNaN(n))return "—";return `${n>0?"+":""}${n}`}
function hasMovementData(rows=leagueRows()){return rows.some(r=>pointsDelta(r)!==null)}
function computeMarketMovers(rows=leagueRows()){const entries=rows.map((r,i)=>({row:r,delta:pointsDelta(r),rank:i+1})).filter(x=>x.delta!==null&&!isNaN(x.delta));if(!entries.length)return null;const rise=[...entries].sort((a,b)=>b.delta-a.delta||a.rank-b.rank)[0];const fall=[...entries].sort((a,b)=>a.delta-b.delta||a.rank-b.rank)[0];const stable=[...entries].sort((a,b)=>Math.abs(a.delta)-Math.abs(b.delta)||a.rank-b.rank)[0];return{rise,fall,stable}}
function moverMini(title,item,type){if(!item)return `<div class="mover-card ${type}"><div class="mover-label">${esc(title)}</div><div class="muted">Needs previous table data</div></div>`;const cls=item.delta>0?"up":item.delta<0?"down":"same";const arrow=item.delta>0?"▲":item.delta<0?"▼":"—";return `<div class="mover-card ${type}"><div class="mover-top"><div class="mover-label">${esc(title)}</div><div class="mover-change ${cls}">${arrow} ${esc(formatDelta(item.delta))}</div></div>${teamDisplay(item.row)}<div class="small" style="margin-top:8px">Current: ${totalPoints(item.row)} pts</div></div>`}
function renderMarketMovers(){const movers=computeMarketMovers();return `<div class="card" id="movers-capture"><div class="card-header"><div><div class="kicker">Market Movers</div><h3 class="section-title">Who moved the market?</h3><div class="window-note">Snapshot comparison from the latest table update.</div></div><button class="cta" onclick="adminShareCard('movers')">${isShareAdminUnlocked()?"📸 Movers":"🔒 Admin"}</button></div>${movers?`<div class="market-strip">${moverMini("Biggest riser",movers.rise,"rise")}${moverMini("Biggest faller",movers.fall,"fall")}${moverMini("Most stable",movers.stable,"steady")}</div>`:`<div class="empty-row">No previous snapshot found yet. Once the previous table is available, movers appear here.</div>`}</div>`}
function nationStatus(row){return clean(val(row,["Nation_Status","Nation Status","Status","Portfolio_Status","Portfolio Status"]))||"Active"}
function nationStatusSlug(row){const s=slug(nationStatus(row));if(s.includes("elim")||s.includes("out")||s.includes("dead"))return"eliminated";if(s.includes("qual")||s.includes("through"))return"qualified";return"active"}
function statusBadgeForNation(row){const st=nationStatusSlug(row);const label=st==="qualified"?"Qualified":st==="eliminated"?"Eliminated":"Active";return `<span class="badge status-${st}">${label}</span>`}
function aliveStats(rows){const total=rows.filter(r=>nationName(r)).length;const alive=rows.filter(r=>nationName(r)&&nationStatusSlug(r)!=="eliminated").length;const qualified=rows.filter(r=>nationStatusSlug(r)==="qualified").length;let label="Stable";if(total&&alive===0)label="Liquidated Vibes";else if(total&&alive<=2)label="Barely Breathing";else if(total&&alive<=3)label="Danger Zone";else if(total&&alive>=5)label="Healthy Portfolio";else if(total&&qualified>=3)label="Knockout Merchant";return{total,alive,qualified,label,ratio:total?alive/total:0}}
function groupedPortfolios(){const groups={};state.portfolios.forEach(r=>{const t=teamName(r);if(!t||t==="TBC")return;(groups[t]??=[]).push(r)});return groups}
function renderAliveTracker(limit=8){const groups=groupedPortfolios();const items=Object.entries(groups).map(([t,rows])=>({t,rows,stats:aliveStats(rows),league:leagueRows().find(r=>slug(teamName(r))===slug(t))})).sort((a,b)=>b.stats.alive-a.stats.alive||totalPoints(b.league||{})-totalPoints(a.league||{}));return `<div class="card"><div class="card-header"><div><div class="kicker">Still Alive Tracker</div><h3 class="section-title">Portfolio survival board</h3></div>${badge("Knockout ready","gold")}</div><div class="alive-grid">${items.slice(0,limit).map(x=>`<div class="alive-card" onclick="openPortfolioProfile(${jsArg(x.t)})"><div class="small">${esc(x.stats.label)}</div><div class="alive-count">${x.stats.alive}/${x.stats.total||0}</div><div class="team-name-stack"><b>${esc(x.t)}</b><span class="small">${esc(managerName(x.rows[0]))}</span></div><div class="alive-bar"><span style="width:${Math.round(x.stats.ratio*100)}%"></span></div></div>`).join("")||`<div class="empty-row">No portfolio rows found yet.</div>`}</div></div>`}
function matchGoals(m){const s=fdScore(m);const bits=String(s).split("-").map(x=>toNum(x));if(bits.length<2||!String(s).includes("-"))return null;return{home:bits[0],away:bits[1]}}
function wcsxScoreReasons(goalsFor,goalsAgainst){const reasons=[];let pts=0;if(goalsFor>goalsAgainst){pts+=5;reasons.push("win +5")}else if(goalsFor===goalsAgainst){pts+=2;reasons.push("draw +2")}if(goalsAgainst===0){pts+=2;reasons.push("clean sheet +2")}if(goalsFor>=3){pts+=2;reasons.push("3+ goals +2")}if(goalsFor-goalsAgainst>=3){pts+=3;reasons.push("big win +3")}if(goalsAgainst-goalsFor>=3){pts-=3;reasons.push("heavy loss -3")}if(goalsAgainst>=4){pts-=3;reasons.push("concede 4+ -3")}return{pts,reasons}}
function buildCommentary(){const items=[];liveMatches().forEach(m=>{const g=matchGoals(m);if(!g)return;[{side:"home",nation:fdHome(m),code:m.homeTeam?.tla,for:g.home,against:g.away,opp:fdAway(m)},{side:"away",nation:fdAway(m),code:m.awayTeam?.tla,for:g.away,against:g.home,opp:fdHome(m)}].forEach(x=>{const owners=ownersForNation(x.nation,x.code);if(!owners.length)return;const impact=wcsxScoreReasons(x.for,x.against);const verb=x.for>x.against?"leading":x.for<x.against?"trailing":"level with";const risk=x.against===0?`Risk: one ${x.opp} goal wipes the clean-sheet dividend.`:x.for===x.against?"Risk: next goal swings the market hard.":"Risk: negative bonuses can still bite if this gets ugly.";owners.forEach(o=>items.push({title:`${x.nation} currently ${verb} ${x.opp} — ${teamName(o)} ${impact.pts>=0?"up":"down"} ${formatDelta(impact.pts)}.`,meta:`Match: ${fdHome(m)} v ${fdAway(m)} • ${fdScore(m)} • ${risk}`,details:{match:`${fdHome(m)} v ${fdAway(m)}`,owner:teamName(o),nation:x.nation,impact:impact.pts,reasons:impact.reasons,risk}}))})});if(!items.length){const up=upcomingMatchesForCurrentWindow().slice(0,3);up.forEach(m=>{const watched=[...ownersForNation(fdHome(m),m.homeTeam?.tla),...ownersForNation(fdAway(m),m.awayTeam?.tla)];const unique=[...new Map(watched.map(o=>[teamKey(o),o])).values()];unique.slice(0,2).forEach(o=>items.push({title:`${teamName(o)} has eyes on ${fdHome(m)} v ${fdAway(m)} — pre-market nerves activated.`,meta:`Kick-off ${fdDate(m).dateTime}. No points banked yet, just pure spreadsheet anxiety.`,details:{match:`${fdHome(m)} v ${fdAway(m)}`,owner:teamName(o),nation:"Pre-match",impact:0,reasons:["fixture pending"],risk:"No score yet — market opens at kick-off."}}))})}state.commentaryItems=items;return items}
function renderCommentary(){const items=buildCommentary();return `<div class="card"><div class="card-header"><div><div class="kicker">Live Stock Commentary</div><h3 class="section-title">Trading floor noise</h3></div>${badge(items.length?"Rule-based":"Waiting","purple")}</div><div class="commentary-list">${items.slice(0,5).map((it,i)=>`<div class="commentary-item" onclick="openCommentaryDetail(${i})"><div class="commentary-title">${esc(it.title)}</div><div class="commentary-meta">${esc(it.meta)}</div></div>`).join("")||`<div class="empty-row">No live owned fixtures to commentate on yet.</div>`}</div></div>`}
function ownedSummaryForFixture(home,away,homeCode="",awayCode=""){const owners=[...ownersForNation(home,homeCode),...ownersForNation(away,awayCode)];const unique=[...new Map(owners.map(o=>[teamKey(o),o])).values()];if(!unique.length)return"no owned portfolios exposed";return unique.slice(0,3).map(o=>teamName(o)).join(", ")+`${unique.length>3?" + more":""}`}
function previousPeriodResults(limit=4){const api=apiMatchesForDay(-1).filter(m=>fdScore(m)&&fdStatus(m)==="Played").sort((a,b)=>fdDate(a).sort-fdDate(b).sort).slice(-limit);if(api.length)return api.map(m=>`RESULT: ${fdHome(m)} ${fdScore(m)} ${fdAway(m)} — ${ownedSummaryForFixture(fdHome(m),fdAway(m),m.homeTeam?.tla,m.awayTeam?.tla)}`);const rows=sheetFixturesForDay(-1).filter(r=>scoreDisplay(r)||slug(sheetStatus(r)).includes("played")||slug(sheetStatus(r)).includes("finish")).slice(-limit);return rows.map(r=>{const n=fixtureName(r);return `RESULT: ${n.a||"TBD"} ${scoreDisplay(r)||"played"} ${n.b||"TBD"} — ${ownedSummaryForFixture(n.a,n.b)}`})}

function tickerRowActive(row){const raw=clean(val(row,["Active","Enabled","Show"]));if(!raw)return false;return !["false","no","0","off","inactive"].includes(raw.toLowerCase())}
function tickerRowExpired(row){const raw=clean(val(row,["Expires_At","Expires At","Expiry","Expire_At"]));if(!raw)return false;const d=new Date(raw);return !isNaN(d)&&Date.now()>d.getTime()}
function tickerSheetItems(limit=12){return [...state.ticker].filter(r=>tickerRowActive(r)&&!tickerRowExpired(r)).sort((a,b)=>toNum(val(a,["Priority","Order"]))-toNum(val(b,["Priority","Order"]))).map(r=>{const type=(clean(val(r,["Type"]))||"MARKET").toUpperCase();const h=clean(val(r,["Headline","Title","Message"]));const sub=clean(val(r,["Sub_Text","Sub Text","Body","Detail"]));if(!h)return"";const label=h.toUpperCase().startsWith(type+":")?h:`${type}: ${h}`;return `${label}${sub?` — ${sub}`:""}`}).filter(Boolean).slice(0,limit)}
function aliveTickerItems(limit=4){const groups=groupedPortfolios();return Object.entries(groups).map(([t,rows])=>({t,stats:aliveStats(rows),rows})).filter(x=>x.stats.total).sort((a,b)=>a.stats.alive-b.stats.alive||a.t.localeCompare(b.t)).slice(0,limit).map(x=>`SURVIVAL WATCH: ${x.t} ${x.stats.alive}/${x.stats.total} nations alive — ${x.stats.label}`)}
function rankMoveTickerItems(limit=5){const rows=leagueRows();return rows.map((r,i)=>{const move=state.tableMoves[teamKey(r)]||{dir:"same",delta:0};const pd=pointsDelta(r);return{r,i,move,pd}}).filter(x=>(x.move.delta&&x.move.dir!=="same")||x.pd!==null).sort((a,b)=>{const am=a.move.delta||Math.abs(a.pd||0),bm=b.move.delta||Math.abs(b.pd||0);return bm-am||a.i-b.i}).slice(0,limit).map(x=>{const dir=x.move.dir==="up"?`up ${x.move.delta}`:x.move.dir==="down"?`down ${x.move.delta}`:"steady";const pts=x.pd!==null?` • points ${formatDelta(x.pd)}`:"";return `TABLE MOVE: ${teamName(x.r)} ${dir} place${x.move.delta===1?"":"s"}${pts}`})}
function buildHeadlines(){const rows=leagueRows();const headlines=[];headlines.push(...tickerSheetItems(12));headlines.push(...previousPeriodResults(4));headlines.push(...rankMoveTickerItems(5));const movers=computeMarketMovers(rows);if(movers?.rise)headlines.push(`BIGGEST RISER: ${teamName(movers.rise.row)} ${formatDelta(movers.rise.delta)} pts this snapshot`);if(movers?.fall&&movers.fall.delta<0)headlines.push(`BIGGEST FALLER: ${teamName(movers.fall.row)} ${formatDelta(movers.fall.delta)} pts — market wobble detected`);headlines.push(...aliveTickerItems(4));const live=liveMatches()[0];if(live)headlines.unshift(`LIVE PRICE ACTION: ${fdHome(live)} v ${fdAway(live)} is moving owned portfolios now`);if(rows[0])headlines.push(`TOP OF THE EXCHANGE: ${teamName(rows[0])} leads on ${totalPoints(rows[0])} pts`);const unique=[];const seen=new Set();for(const h of headlines){const k=slug(h);if(!k||seen.has(k))continue;seen.add(k);unique.push(h)}if(!unique.length)unique.push("MARKET OPEN: Portfolios loaded, chaos pending");return unique.slice(0,18)}

function heatForTeam(team,rows){const lr=leagueRows().find(r=>slug(teamName(r))===slug(team));const delta=lr?pointsDelta(lr):null;const alive=aliveStats(rows);let label="😐 Stable",cls="heat-flat";if(alive.total&&alive.alive===0){label="💀 In Administration";cls="heat-dead"}else if(delta!==null&&delta>=6){label="🔥 Hot Stock";cls="heat-hot"}else if(delta!==null&&delta>0){label="📈 Bullish";cls="heat-bull"}else if(delta!==null&&delta<0){label="📉 Bearish";cls="heat-bear"}else if(alive.alive<=2&&alive.total){label="⚠️ Danger Zone";cls="heat-bear"}return{label,cls,delta,league:lr,alive}}

async function captureShareCard(type){if(!isShareAdminUnlocked()){toast("Admin PIN needed for share cards");if(!unlockShareAdmin())return}try{toast("Building WhatsApp card...");const html2canvas=await loadHtml2Canvas();const el=document.createElement("div");el.id="share-card-temp";el.className="share-card-export";el.innerHTML=shareCardHtml(type);document.body.appendChild(el);await new Promise(r=>requestAnimationFrame(()=>requestAnimationFrame(r)));const canvas=await html2canvas(el,{backgroundColor:"#050914",scale:2,useCORS:true,allowTaint:false,logging:false});canvas.toBlob(async blob=>{if(!blob){toast("Could not create image");el.remove();return}try{if(navigator.clipboard&&window.ClipboardItem){await navigator.clipboard.write([new ClipboardItem({"image/png":blob})]);toast("Copied image. Also downloading PNG...")}else toast("Downloading PNG...")}catch(e){toast("Downloading PNG...")}const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`wcsx-${type}-card.png`;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(a.href),2000);el.remove()},"image/png")}catch(e){toast("Share card failed: "+e.message)}}

function getRowsFromGvizResponse(json){const cols=json.table.cols.map((c,i)=>clean(c.label||c.id||`Col${i+1}`));return json.table.rows.map(r=>{const o={};cols.forEach((c,i)=>{const cell=r.c[i];o[c]=cell?(cell.f??cell.v??""):""});return o}).filter(row=>Object.values(row).some(v=>clean(v)!==""))}
function loadSheet(key,sheetName,quiet=false){return new Promise(resolve=>{const cb="gviz_"+key+"_"+Math.random().toString(36).slice(2);const timeout=setTimeout(()=>{if(!quiet)state.errors.push(`${sheetName}: load timed out`);cleanup();resolve([])},12000);function cleanup(){clearTimeout(timeout);try{delete window[cb]}catch(e){window[cb]=undefined}const s=document.getElementById(cb);if(s)s.remove()}window[cb]=json=>{try{if(json.status==="error")throw new Error(json.errors?.[0]?.detailed_message||"Google returned an error");const rows=getRowsFromGvizResponse(json);cleanup();resolve(rows)}catch(e){if(!quiet)state.errors.push(`${sheetName}: ${e.message}`);cleanup();resolve([])}};const script=document.createElement("script");script.id=cb;script.onerror=()=>{if(!quiet)state.errors.push(`${sheetName}: script load failed`);cleanup();resolve([])};script.src=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=responseHandler:${cb}&sheet=${encodeURIComponent(sheetName)}&tq=${encodeURIComponent("select *")}&_=${Date.now()}`;document.body.appendChild(script)})}

async function loadApiMatches(){const proxy=getProxyUrl();if(!proxy||proxy.includes("PASTE_YOUR_APPS_SCRIPT_WEB_APP_URL_HERE"))return[];const url=proxy+(proxy.includes("?")?"&":"?")+"mode=matches&_="+Date.now();const res=await fetch(url,{cache:"no-store"});if(!res.ok)throw new Error(`Proxy HTTP ${res.status}`);const json=await res.json();if(json.ok===false)throw new Error(json.message||json.error||"Proxy returned error");const stamp=json.generatedAt?new Date(json.generatedAt):new Date();state.apiSource=`football-data.org • ${stamp.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"})}`;return Array.isArray(json.matches)?json.matches:[]}

function fdStatus(m){const s=String(m.status||"").toUpperCase();if(["FINISHED","AWARDED"].includes(s))return"Played";if(["IN_PLAY","PAUSED","LIVE"].includes(s))return"In-play";if(["SCHEDULED","TIMED"].includes(s))return"Scheduled";return clean(m.status)||"Scheduled"}
function fdScore(m){const sc=m.score||{};const ft=sc.fullTime||{}, rt=sc.regularTime||{}, ht=sc.halfTime||{};const h=ft.home??rt.home??(fdStatus(m)==="In-play"?ht.home:undefined);const a=ft.away??rt.away??(fdStatus(m)==="In-play"?ht.away:undefined);if(h===null||h===undefined||a===null||a===undefined)return"";return `${h} - ${a}`}
function fdHome(m){return m.homeTeam?.shortName||m.homeTeam?.name||"TBD"}
function fdAway(m){return m.awayTeam?.shortName||m.awayTeam?.name||"TBD"}
function fdDate(m){const d=new Date(m.utcDate);if(isNaN(d))return{date:"",time:"",sort:0,dateTime:""};return{sort:d.getTime(),date:d.toLocaleDateString("en-GB",{weekday:"short",day:"2-digit",month:"short"}),time:d.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"}),dateTime:d.toLocaleString("en-GB",{weekday:"short",day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"})}}
function normalizeNation(n){let x=slug(n);const aliases={usa:"unitedstates",unitedstatesofamerica:"unitedstates",turkiye:"turkey",türkiye:"turkey",cotedivoire:"ivorycoast",caboverde:"capeverde",curacao:"curacao",curaçao:"curacao",congodr:"drcongo",democraticrepublicofcongo:"drcongo",czechrepublic:"czechia",bosniaherzegovina:"bosniaandherzegovina",bosnia:"bosniaandherzegovina",korearepublic:"southkorea",republicofkorea:"southkorea",drcongo:"drcongo"};return aliases[x]||x}
function ownersForNation(name,code=""){const n=normalizeNation(name),c=clean(code).toUpperCase();return state.portfolios.filter(r=>isFilledPortfolio(r)&&(normalizeNation(nationName(r))===n || clean(nationCode(r)).toUpperCase()===c)).slice(0,4)}

function parseSheetDateValue(raw){
  raw=clean(raw);if(!raw)return 0;
  let d=new Date(raw);if(!isNaN(d))return d.getTime();
  let m=raw.match(/Date\((\d{4})\s*,\s*(\d{1,2})\s*,\s*(\d{1,2})(?:\s*,\s*(\d{1,2}))?(?:\s*,\s*(\d{1,2}))?(?:\s*,\s*(\d{1,2}))?\)/);
  if(m){d=new Date(Number(m[1]),Number(m[2]),Number(m[3]),Number(m[4]||0),Number(m[5]||0),Number(m[6]||0));return isNaN(d)?0:d.getTime()}
  m=raw.match(/^(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{2,4})(?:\s+(\d{1,2}):(\d{2}))?/);
  if(m){let y=Number(m[3]);if(y<100)y+=2000;d=new Date(y,Number(m[2])-1,Number(m[1]),Number(m[4]||0),Number(m[5]||0));return isNaN(d)?0:d.getTime()}
  m=raw.match(/^(?:\w{3,9},?\s+)?(\d{1,2})\s+([A-Za-z]{3,9})(?:\s+(\d{4}))?(?:.*?(\d{1,2}):(\d{2}))?/);
  if(m){const months={jan:0,january:0,feb:1,february:1,mar:2,march:2,apr:3,april:3,may:4,jun:5,june:5,jul:6,july:6,aug:7,august:7,sep:8,sept:8,september:8,oct:9,october:9,nov:10,november:10,dec:11,december:11};const mo=months[m[2].toLowerCase()];if(mo!==undefined){d=new Date(Number(m[3]||new Date().getFullYear()),mo,Number(m[1]),Number(m[4]||0),Number(m[5]||0));return isNaN(d)?0:d.getTime()}}
  return 0;
}

function gameDayStart(offset=0){const d=new Date();d.setHours(GAME_DAY_START_HOUR,0,0,0);if(Date.now()<d.getTime())d.setDate(d.getDate()-1);d.setDate(d.getDate()+offset);return d}
function gameDayEnd(offset=0){const d=gameDayStart(offset);d.setDate(d.getDate()+1);return d}
function gameDayLabel(offset=0){const s=gameDayStart(offset),e=gameDayEnd(offset);return `${s.toLocaleDateString("en-GB",{weekday:"short",day:"2-digit",month:"short"})} ${GAME_DAY_START_LABEL} → ${e.toLocaleDateString("en-GB",{weekday:"short",day:"2-digit",month:"short"})} ${GAME_DAY_START_LABEL}`}
function apiMatchesForDay(offset=0){const s=gameDayStart(offset).getTime(),e=gameDayEnd(offset).getTime();return state.apiMatches.filter(m=>{const t=fdDate(m).sort;return t>=s&&t<e}).sort((a,b)=>fdDate(a).sort-fdDate(b).sort)}
function allSheetFixturesSorted(){return [...state.fixtures].filter(r=>fixtureName(r).a||fixtureName(r).b).sort((a,b)=>{const ta=fixtureDateSort(a),tb=fixtureDateSort(b);if(ta&&tb)return ta-tb;if(ta)return-1;if(tb)return 1;return 0})}
function sheetFixturesForDay(offset=0){const s=gameDayStart(offset).getTime(),e=gameDayEnd(offset).getTime();const all=allSheetFixturesSorted();const exact=all.filter(r=>{const t=fixtureDateSort(r);return t>=s&&t<e});if(exact.length)return exact;const unplayed=all.filter(r=>!slug(sheetStatus(r)).includes("played")&&!slug(sheetStatus(r)).includes("finish"));if(offset===0&&unplayed.length)return unplayed.slice(0,8);return all.slice(0,8)}

function compactTableHtml(rows){return `<table><thead><tr><th>#</th><th></th><th>Portfolio</th><th>Pts</th></tr></thead><tbody>${rows.map((r,i)=>`<tr><td><span class="pos ${i<3?"top":""}">${i+1}</span></td><td>${trendHtml(r)}</td><td>${teamDisplay(r)}</td><td class="points">${totalPoints(r)}</td></tr>`).join("")}</tbody></table>`}
function fullTableHtml(rows){return `<table><thead><tr><th>#</th><th></th><th>Portfolio</th><th>W</th><th>L</th><th>D</th><th>+PTS</th><th>-PTS</th><th>Pts</th></tr></thead><tbody>${rows.map((r,i)=>`<tr><td><span class="pos ${i<3?"top":""}">${i+1}</span></td><td>${trendHtml(r)}</td><td>${teamDisplay(r)}</td><td><span class="table-stat">${wins(r)}</span></td><td><span class="table-stat">${losses(r)}</span></td><td><span class="table-stat">${draws(r)}</span></td><td><span class="table-stat good">${positivePts(r)}</span></td><td><span class="table-stat bad">${negativePts(r)}</span></td><td class="points">${totalPoints(r)}</td></tr>`).join("")}</tbody></table>`}

function renderLiveMarketCentre(){const live=liveMatches();if(live.length){return `<div class="card match-centre clean-card"><div class="card-header"><div><div class="kicker">Live / In-play</div><h3 class="section-title">${live.length} match${live.length>1?"es":""} moving the market</h3><div class="window-note">Current window: ${esc(gameDayLabel(0))}</div></div>${badge(state.apiSource,"red")}</div><div class="grid ${live.length>1?"two":""}">${live.slice(0,4).map(m=>apiMatchCard(m,true)).join("")}</div></div>`}const upcoming=upcomingMatchesForCurrentWindow().slice(0,2);if(upcoming.length){return `<div class="card match-centre clean-card"><div class="card-header"><div><div class="kicker">Live / Next Up</div><h3 class="section-title">No live games — next market open</h3><div class="window-note">Current window: ${esc(gameDayLabel(0))}</div></div>${badge(state.apiSource,"blue")}</div><div class="grid two">${upcoming.map(m=>apiMatchCard(m)).join("")}</div></div>`}return ""}

function renderHome(){const home=document.getElementById("home");const table=leagueRows();home.innerHTML=`${renderHeadlines()}${renderLiveMarketCentre()}<div class="grid two" style="margin-top:14px"><div>${renderMarketMovers()}<div style="height:14px"></div>${renderCommentary()}</div><div><div class="card"><div class="card-header"><div><div class="kicker">WCSX Table</div><h3 class="section-title">Top portfolios</h3></div><button class="cta" onclick="showPage('table')">Full table</button></div>${compactTableHtml(table.slice(0,8))}</div></div></div>${state.errors.length?`<div class="error">${state.errors.map(esc).join("<br>")}</div>`:""}`}

function renderTable(){const rows=leagueRows();document.getElementById("table").innerHTML=`<div class="card" id="league-capture"><div class="card-header"><div><div class="kicker">League Table</div><h2 class="section-title">WCSX standings</h2><div class="window-note">Arrows show movement since the last dashboard refresh. +PTS / -PTS need matching columns in Public_League_Table.</div></div><div class="table-actions"><button class="cta" onclick="captureElement('league-capture','wcsx-league-table.png')">📸 Table</button></div></div>${fullTableHtml(rows)}</div>`}
function renderFixtures(){const matches=apiMatchesForDay(state.fixtureDayOffset);const sheetRows=sheetFixturesForDay(state.fixtureDayOffset);const useApi=matches.length>0;const title=state.fixtureDayOffset===0?"Current game day":state.fixtureDayOffset>0?`Game day +${state.fixtureDayOffset}`:`Game day ${state.fixtureDayOffset}`;const items=useApi?matches.map(m=>apiMatchCard(m)).join(""):sheetRows.map(fallbackFixtureCard).join("");const source=useApi?state.apiSource:"Sheet fixtures";document.getElementById("fixtures").innerHTML=`<div class="card" id="fixtures-capture"><div class="card-header"><div><div class="kicker">Fixtures</div><h2 class="section-title">${esc(title)}</h2><div class="window-note">${esc(gameDayLabel(state.fixtureDayOffset))}</div></div><div class="table-actions">${badge(source,useApi?"green":"blue")}<button class="cta" onclick="changeFixtureDay(-1)">◀</button><button class="cta" onclick="state.fixtureDayOffset=0;renderFixtures()">Today</button><button class="cta" onclick="changeFixtureDay(1)">▶</button><button class="cta" onclick="captureElement('fixtures-capture','wcsx-fixtures-${state.fixtureDayOffset}.png')">📸 Fixtures</button></div></div><div class="grid two">${items||"<div class='empty-row'>No fixtures found. Check Public_Fixtures is published and has Home/Away teams plus a date/status.</div>"}</div></div>`}
function changeFixtureDay(delta){state.fixtureDayOffset+=delta;renderFixtures()}
function renderPortfolios(){const groups=groupedPortfolios();document.getElementById("portfolios").innerHTML=`<div class="card"><div class="card-header"><div><div class="kicker">Portfolio Heat</div><h2 class="section-title">Team profiles</h2><div class="window-note">Click any card for a full profile: rank, record, points, alive nations, best/worst nation and statuses.</div></div>${badge("Heat ratings","gold")}</div></div><div class="grid two" style="margin-top:14px">${Object.entries(groups).map(([t,rows])=>{const heat=heatForTeam(t,rows);return `<div class="card portfolio-card" onclick="openPortfolioProfile(${jsArg(t)})"><div class="card-header"><div>${teamDisplay(rows[0])}</div><span class="heat-badge ${heat.cls}">${esc(heat.label)}</span></div><div class="profile-grid"><div class="profile-stat"><span class="small">Alive</span><b>${heat.alive.alive}/${heat.alive.total||0}</b></div><div class="profile-stat"><span class="small">Move</span><b>${formatDelta(heat.delta)}</b></div></div><div class="fixture-list" style="margin-top:10px">${rows.map(r=>`<div class="nation-status-row"><strong>${esc(nationName(r))}</strong>${statusBadgeForNation(r)}</div>`).join("")}</div></div>`}).join("")||`<div class="empty-row">No portfolios found.</div>`}</div>`}

function renderAdmin(){document.getElementById("admin").innerHTML=`<div class="grid two"><div>${renderShareCentre()}</div><div class="card"><div class="card-header"><div><div class="kicker">Admin tools</div><h2 class="section-title">Commissioner controls</h2><div class="window-note">Share-card tools live here now, away from the Trading Floor.</div></div></div><div class="fixture-list"><div class="mini-card"><b>WhatsApp card lock</b><div class="small">PIN gate is casual protection for organiser tools.</div></div><div class="mini-card"><b>Ticker source</b><div class="small">Market ticker reads Public_Ticker first, then falls back to auto market messages.</div></div></div></div></div>`}
function renderRules(){document.getElementById("rules").innerHTML=`<div class="card"><div class="card-header"><div><div class="kicker">Rules</div><h2 class="section-title">Scoring rules</h2></div></div>${state.rules.length?`<table><tbody>${state.rules.map(r=>`<tr>${Object.values(r).slice(0,4).map(v=>`<td>${esc(v)}</td>`).join("")}</tr>`).join("")}</tbody></table>`:`<p class="muted">Rules tab loaded from your Sheet. No rule rows found.</p>`}</div>`}
function renderAll(){renderHome();renderTable();renderFixtures();renderPortfolios();renderAdmin();renderRules()}
async function refreshData(){state.errors=[];try{const [league,previousLeague,fixtures,portfolios,rules,ticker]=await Promise.all([loadSheet("league",TABLES.league),loadSheet("previousLeague",TABLES.previousLeague,true),loadSheet("fixtures",TABLES.fixtures),loadSheet("portfolios",TABLES.portfolios),loadSheet("rules",TABLES.rules),loadSheet("ticker",TABLES.ticker,true)]);state.league=league;state.previousLeague=previousLeague;state.fixtures=fixtures;state.portfolios=portfolios;state.rules=rules;state.ticker=ticker}catch(e){state.errors.push(e.message)}try{state.apiMatches=await loadApiMatches()}catch(e){state.errors.push("API: "+e.message);state.apiMatches=[];state.apiSource="Sheet fallback"}state.lastRefresh=new Date();computeTableMoves(leagueRows());renderAll()}
function showPage(id){document.querySelectorAll(".page").forEach(p=>p.classList.toggle("active",p.id===id));document.querySelectorAll(".navbtn").forEach(b=>b.classList.toggle("active",b.dataset.page===id));window.scrollTo({top:0,behavior:"smooth"})}

document.getElementById("nav").addEventListener("click",e=>{const b=e.target.closest(".navbtn");if(b)showPage(b.dataset.page)});

function toast(msg){let el=document.getElementById("screenshot-toast");if(!el){el=document.createElement("div");el.id="screenshot-toast";el.className="screenshot-toast";document.body.appendChild(el)}el.textContent=msg;el.classList.add("show");setTimeout(()=>el.classList.remove("show"),2600)}
function loadHtml2Canvas(){return new Promise((resolve,reject)=>{if(window.html2canvas)return resolve(window.html2canvas);const s=document.createElement("script");s.src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js";s.onload=()=>resolve(window.html2canvas);s.onerror=()=>reject(new Error("Could not load screenshot tool"));document.head.appendChild(s)})}
async function captureElement(id,filename){try{toast("Building image...");const el=document.getElementById(id);if(!el)throw new Error("Nothing to capture");const html2canvas=await loadHtml2Canvas();const canvas=await html2canvas(el,{backgroundColor:"#050914",scale:2,useCORS:true,allowTaint:false,logging:false});canvas.toBlob(async blob=>{if(!blob)throw new Error("Could not create image");try{if(navigator.clipboard&&window.ClipboardItem){await navigator.clipboard.write([new ClipboardItem({"image/png":blob})]);toast("Copied image. Also downloading PNG...")}else{toast("Downloading PNG...")}}catch(e){toast("Downloading PNG...")}const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=filename||"wcsx-image.png";document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(a.href),2000)},"image/png") }catch(e){toast("Screenshot failed: "+e.message)}}


const VIEW_MODE_KEY="wcsx_view_mode_v2";
function applyViewMode(mode){
  const isMobile=mode==="mobile";
  document.body.classList.toggle("mobile-lite",isMobile);
  const btn=document.getElementById("viewToggle");
  if(btn)btn.textContent=isMobile?"Full view":"Mobile view";
}
function openViewPicker(){const el=document.getElementById("view-picker");if(el){el.classList.add("open");el.setAttribute("aria-hidden","false")}}
function closeViewPicker(){const el=document.getElementById("view-picker");if(el){el.classList.remove("open");el.setAttribute("aria-hidden","true")}}
function setViewMode(mode){localStorage.setItem(VIEW_MODE_KEY,mode);applyViewMode(mode);closeViewPicker();renderAll()}
function toggleViewMode(){const next=document.body.classList.contains("mobile-lite")?"full":"mobile";setViewMode(next)}
function initViewMode(){
  const saved=localStorage.getItem(VIEW_MODE_KEY);
  if(saved){applyViewMode(saved);return}
  if(window.matchMedia&&window.matchMedia("(max-width: 760px)").matches){openViewPicker();applyViewMode("mobile")}else{applyViewMode("full")}
}

initViewMode();
refreshData();setInterval(refreshData,60000);
</script>

</body>
